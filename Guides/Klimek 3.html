<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📘 Klimek 3: Cardiac, Tubes & CHD</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; min-height: 100vh; min-height: 100dvh; background: #b8aad0; }
        html.dark, html.dark body { background: #0f172a; }
    </style>
</head>
<body>
<script>
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.classList.add('dark');
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(event) {
    if (event.matches) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }
});
</script>

<!-- Peptopia Klimek Guide Widget -->
<div id="peptopia-klimek-guide">
    <style>
        /* --- Scoped Styles --- */
        #peptopia-klimek-guide {
            --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
            --slate-700: #334155; --slate-800: #1e293b; --slate-900: #0f172a; --white: #ffffff;
            --rose-500: #fb7185; --blue-500: #06b6d4; --purple-500: #8b5cf6;
            --emerald-500: #10b981; --amber-500: #d97706; --pink-500: #ec4899; 
            
            /* Backgrounds (Pale versions for selection) */
            --rose-50: #fff1f2; --blue-50: #ecfeff; --purple-50: #f5f3ff;
            --emerald-50: #ecfdf5; --amber-50: #fffbeb; --pink-50: #fdf2f8; 

            /* Alert Colors */
            --alert-bg: #fff7ed;
            --alert-border: #fdba74;
            --alert-text: #1e293b;
            
            /* UI Accents */
            --accent-gold: #f59e0b;

            background-color: transparent; color: var(--slate-900); line-height: 1.6;
            font-size: 16px; max-width: 76rem; margin: 0 auto; padding: 0.75rem;
            box-sizing: border-box; -webkit-text-size-adjust: 100%;
        }
        html.dark #peptopia-klimek-guide {
            --slate-50: #0f172a; --slate-100: #1e293b; --slate-200: #334155;
            --slate-700: #cbd5e1; --slate-800: #0f172a; --slate-900: #f1f5f9; --white: #1e293b;
            --rose-50: #1a0a0d; --blue-50: #0a1a1f; --purple-50: #0f0a1f;
            --emerald-50: #0a1a12; --amber-50: #1a150a; --pink-50: #1a0a14;

        #peptopia-klimek-guide * { box-sizing: border-box; }

        /* Navbar */

            background: linear-gradient(135deg, #0a1628 0%, #0c2461 50%, #0a1628 100%);
            color: #fff; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 16px -2px rgba(10, 22, 40, 0.5), 0 0 20px rgba(30, 100, 255, 0.15);

        #peptopia-klimek-guide .nav-title { font-weight: 800; font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; text-align: center; }
        
        /* Tabs */

        }

        /* Tab Colors */

        #peptopia-klimek-guide #tab-tubes { background-color: var(--emerald-500); }
        #peptopia-klimek-guide #tab-trouble { background-color: var(--amber-500); }
        #peptopia-klimek-guide #tab-chd { background-color: var(--pink-500); }

        /* Section Header Bar */

        #peptopia-klimek-guide .card-modal-body .card-section { margin-bottom: 1rem; }

        #peptopia-klimek-guide .card-nav {

        }
        html.dark #peptopia-klimek-guide .card-nav { border-top-color: #334155; }
        #peptopia-klimek-guide .card-nav-btn {
            background: #4f46e5; color: white; border: none; padding: 0.55rem 1.25rem;

        html.dark #peptopia-klimek-guide .card-counter { color: #94a3b8; }

        /* Main Grid */
        #peptopia-klimek-guide .grid-layout { display: flex; flex-direction: column; gap: 1.5rem; align-items: flex-start; } 
        @media (min-width: 850px) {
            #peptopia-klimek-guide .grid-layout { flex-direction: row; }

            #peptopia-klimek-guide .grid-layout > div:last-child { flex: 1; width: 100%; position: sticky; top: 1rem; }  /* Right Col */
        }

        /* Description Box */
        #peptopia-klimek-guide .description-box {
            padding: 1rem; background: #ffffff; 
            border: 2px solid #e2e8f0; border-radius: 0.5rem;
            border-left: 6px solid var(--slate-700);
            font-size: 1.05rem; color: #000000; font-weight: 500;
            margin-bottom: 1.5rem;
        }

        /* Data Table */
        #peptopia-klimek-guide .table-container { 
            overflow-x: auto; -webkit-overflow-scrolling: touch; 
            border: 2px solid #334155; border-radius: 0.75rem; 
            background: white; max-height: 600px; overflow-y: auto; 
        }
        html.dark #peptopia-klimek-guide .table-container { background: #1e293b; border-color: #475569; }
        #peptopia-klimek-guide table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        #peptopia-klimek-guide th { 
            padding: 0.75rem; background-color: #f1f5f9; color: #0f172a; 
            border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 5; 
            font-weight: 800; font-size: 0.9rem;
        }
        html.dark #peptopia-klimek-guide th { background-color: #334155; color: #f1f5f9; border-bottom-color: #475569; }

        #peptopia-klimek-guide .key-point-cell { color: #334155; font-style: normal; font-weight: 500; }
        html.dark #peptopia-klimek-guide .key-point-cell { color: #cbd5e1; }
        #peptopia-klimek-guide .alert-cell { color: #991b1b; background-color: #fef2f2; border-left: 3px solid #f87171; font-weight: 600; }
        html.dark #peptopia-klimek-guide .alert-cell { background-color: #1c1012; color: #fca5a5; border-left-color: #dc2626; }

            #peptopia-klimek-guide th, #peptopia-klimek-guide td, #peptopia-klimek-guide tr { display: block; width: 100%; }

                    { topic: 'Atrial Treatments (ABCD)', fact: 'Treat Supraventricular (Atrial) arrhythmias with <span class="highlight-term">A-B-C-D</span>.', alert: 'Adenosine, Beta-blockers, Calcium channel blockers, Digoxin.', q: 'Which of the following is NOT part of the ABCD treatment for Atrial arrhythmias?', a: ['Amiodarone', 'Adenosine', 'Beta-blockers', 'Calcium channel blockers'], correct: 0, rationale: 'Amiodarone is for Ventricular rhythms. Atrial rhythms get ABCD: Adenosine, Beta-blockers, Calcium channel blockers, Digoxin (Digitalis).' },
                    { topic: 'Adenosine (Adenocard)', fact: 'Must be pushed FAST (IV push in <span class="highlight-term">< 8 seconds</span>).', alert: 'Patient may experience a brief period of Asystole (flat line). This is normal.', q: 'What is a critical nursing action when administering Adenosine?', a: ['Push it fast (under 8 seconds) and flush immediately', 'Push it slow over 2 minutes', 'Dilute it in 100mL of Normal Saline', 'Check the patient\'s temperature first'], correct: 0, rationale: 'Adenosine has an extremely short half-life and must be slammed into the IV, followed by a rapid 20mL saline flush, to reach the heart in time.' },
                    { topic: 'V-Fib Treatment', fact: 'For V-Fib, you <span class="highlight-term">DEFIB</span>!', alert: 'Shock the patient immediately (Defibrillation).', q: 'What is the definitive treatment for Ventricular Fibrillation?', a: ['Defibrillation (Shock)', 'Epinephrine', 'Amiodarone', 'Synchronized Cardioversion'], correct: 0, rationale: 'V-Fib = Defib. The chaotic electrical activity must be reset with an electrical shock.' },

                    { topic: 'Beta-Blockers vs CCBs', fact: 'Both relax the heart (negative inotropes).', alert: 'Side effects for both: Headache and Hypotension.', q: 'What side effects are shared by Beta-Blockers and Calcium Channel Blockers?', a: ['Headache and Hypotension', 'Tachycardia and Hypertension', 'Nausea and Diarrhea', 'Bleeding and Bruising'], correct: 0, rationale: 'Both drug classes cause vasodilation, which leads to decreased blood pressure (hypotension) and cerebral vasodilation (headache).' }

                    { topic: 'MI vs Angina', fact: 'MI pain is <span class="highlight-term">unrelieved</span> by rest and nitroglycerine.', alert: 'Angina pain IS relieved by rest/nitro. MI causes permanent cell death.', q: 'How do you differentiate Angina from a Myocardial Infarction (MI)?', a: ['Nitroglycerine and rest relieve Angina, but not an MI', 'Angina causes a fever, MI does not', 'MI pain is sharp and stabbing, Angina is dull', 'Only MI causes nausea and sweating'], correct: 0, rationale: 'The classic differentiator is that myocardial infarction causes permanent cell death (necrosis) and the resulting severe pain is unrelieved by rest or nitroglycerine.' },
                    { topic: 'MI Enzymes', fact: '<span class="highlight-term">Troponin</span> rises earliest (as soon as 3 hrs).', alert: 'Other enzymes: CPK, LDH, SGOT. EKG shows ST wave changes.', q: 'Which cardiac enzyme rises earliest after myocardial cell injury?', a: ['Troponin', 'CPK', 'LDH', 'SGOT'], correct: 0, rationale: 'Troponin rises as soon as 3 hours after injury and is highly specific to myocardial damage. It can remain elevated for 7 days.' },
                    { topic: 'MI Pain Description', fact: 'Classic description is <span class="highlight-term">crushing</span>, heavy, or squeezing.', alert: 'Radiates to left arm, neck, jaw, shoulder.', q: 'Which of the following descriptions is a classic presentation of myocardial infarction pain?', a: ['Crushing, heavy, squeezing pain radiating to the jaw', 'Sharp, stabbing pain when breathing in', 'Dull, gnawing pain relieved by eating', 'Intermittent burning pain in the epigastric region'], correct: 0, rationale: 'Myocardial infarction pain is classicly described as a crushing pressure, not sharp or stabbing, often radiating to the left arm, neck, or jaw.' },
                    { topic: 'Post-MI Arrhythmia', fact: '<span class="highlight-term">PVCs</span> are the most common arrhythmia after an MI.', alert: 'Treated with ventricular antiarrhythmics (Lidocaine or Amiodarone).', q: 'What is the most common arrhythmia after an MI, and what drug treats it?', a: ['PVCs treated with Lidocaine', 'A-Fib treated with Digoxin', 'V-Fib treated with Epinephrine', 'Asystole treated with Atropine'], correct: 0, rationale: 'Ventricular irritability is common post-MI. Premature Ventricular Contractions (PVCs) are treated with Lidocaine or Amiodarone.' },
                    { topic: 'CHF Compensation', fact: 'Heart tries to compensate by: Hypertrophy, Dilation, and Tachycardia.', alert: 'Decompensation occurs when these mechanisms fail.', q: 'When cardiac output fails in CHF, name three ways the heart tries to compensate.', a: ['Ventricular hypertrophy, dilation, and increased heart rate', 'Atrophy, constriction, and bradycardia', 'Decreased blood pressure, diuresis, and sleep', 'Vasodilation, slowed conduction, and lowered stroke volume'], correct: 0, rationale: 'When the heart fails to pump adequately, it attempts to compensate by enlarging (hypertrophy/dilation) and speeding up (tachycardia) to maintain circulation.' },
                    { topic: 'Digoxin Toxicity', fact: 'Early signs: Anorexia, N&V. Late signs: <span class="highlight-term">Yellow/green halos</span>.', alert: 'Toxicity level: > 2.0 ng/dL. Hypokalemia increases risk.', q: 'What are the classic signs of Digitalis toxicity?', a: ['Anorexia, N&V, yellow vision, and arrhythmias', 'Diarrhea, hypertension, and headaches', 'Constipation, dry mouth, and blurred vision', 'Lethargy, bradycardia, and cold extremities'], correct: 0, rationale: 'GI symptoms (Anorexia, Nausea, Vomiting) usually appear first in Digoxin toxicity, followed by visual disturbances like yellow/green halos around lights.' },
                    { topic: 'Digoxin Administration', fact: 'Must measure the <span class="highlight-term">apical pulse</span> before giving.', alert: 'Hold if < 60 (adult), < 70 (child), or < 90 (infant).', q: 'At what apical pulse rate should you hold Digoxin for an adult?', a: ['Below 60 bpm', 'Below 50 bpm', 'Below 70 bpm', 'Below 100 bpm'], correct: 0, rationale: 'Digoxin slows conduction through the AV node. Hold the medication if the apical pulse is <60 for adults, <70 for children, or <90 for infants.' },

                    { topic: 'Apical Tubes (A)', fact: 'Placed HIGH (Apex). Removes <span class="highlight-term">AIR</span>.', alert: 'Air rises. Expect bubbling. Not expected to drain fluid.', q: 'A patient has an Apical chest tube. What is this tube primarily designed to remove?', a: ['Air', 'Blood', 'Pus', 'Lymph fluid'], correct: 0, rationale: 'A is for Apical. A is for Air. Air rises to the top (apex) of the pleural space.' },

                    { topic: 'Hemopneumothorax', fact: 'Both blood AND air in the pleural space.', alert: 'Patient needs TWO tubes: Apical (for air) and Basilar (for blood).', q: 'How many chest tubes does a patient with a unilateral hemopneumothorax need?', a: ['Two (one apical, one basilar)', 'One apical', 'One basilar', 'None'], correct: 0, rationale: 'They need an apical tube to remove the air (pneumo) and a basilar tube to remove the blood (hemo).' },

                    { topic: 'Water Seal Breaks', fact: 'The system cracks or breaks open. Emergency!', alert: '1. Clamp, 2. Cut tube, 3. <span class="highlight-term">Submerge in sterile water</span>, 4. Unclamp.', q: 'The water seal of a chest tube breaks. What is the BEST (most important) action by the nurse?', a: ['Submerge the end of the tube in sterile water', 'Clamp the tube', 'Notify the physician', 'Tape the device back together'], correct: 0, rationale: 'Submerging the tube creates a temporary water seal, allowing air to escape but preventing air from entering. Clamping is the FIRST action, but submerging is the BEST action.' },

                    { topic: 'Clamping Rules', fact: 'Never clamp for longer than <span class="highlight-term">15 seconds</span> without MD order.', alert: 'Use rubber-tipped, double clamps.', q: 'What is the maximum amount of time a nurse should clamp a chest tube without a doctor\'s order?', a: ['15 seconds', '30 seconds', '1 minute', '5 minutes'], correct: 0, rationale: 'Clamping blocks air from escaping, which can cause a fatal tension pneumothorax. Never clamp longer than 15 seconds.' }

                    { topic: 'Identifying TRouBLe', fact: 'If it starts with a <span class="highlight-term">T</span>, it is TRouBLe.', alert: 'Examples: Tetralogy of Fallot, Truncus Arteriosus, Transposition of the Great Vessels.', q: 'Which of the following is a TRouBLe congenital heart defect?', a: ['Truncus Arteriosus', 'Ventricular Septal Defect', 'Patent Ductus Arteriosus', 'Atrial Septal Defect'], correct: 0, rationale: 'If the disease starts with a "T", it is a TRouBLe defect (needs immediate surgery, cyanotic).' },
                    { topic: 'Non-TRouBLe Defects', fact: 'Do not need immediate surgery. Normal growth.', alert: 'Left-to-Right shunt. Acyanotic (Pink).', q: 'A baby has a Ventricular Septal Defect (VSD). How should the nurse categorize this?', a: ['Non-TRouBLe (Acyanotic, Left-to-Right shunt)', 'TRouBLe (Cyanotic, Right-to-Left shunt)', 'Lethal within 8 minutes', 'Requires immediate emergency surgery'], correct: 0, rationale: 'VSD does not start with a T. Therefore, it is Non-TRouBLe. The baby will be pink and shunt left-to-right.' },

                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
                osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        // Shuffle function (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- Study Card Modal Logic ---
        let cardIndex = 0;

        function renderCardInModal(item, data, idx, total) {
            document.getElementById('card-modal-header').className = 'card-modal-header ' + data.color;
            document.getElementById('card-modal-title').textContent = data.title + ' \u2014 Study Cards';
            document.getElementById('card-counter').textContent = (idx + 1) + ' / ' + total;
            document.getElementById('card-prev-btn').disabled = (idx === 0);
            document.getElementById('card-next-btn').disabled = (idx >= total - 1);
            document.getElementById('card-modal-body').innerHTML =
                '<div class="card-topic">' + item.topic + '</div>' +
                '<div class="card-section">' +
                    '<span class="card-label">Key Fact</span>' +
                    '<div class="card-fact">' + item.fact + '</div>' +
                '</div>' +
                '<div class="card-section">' +
                    '<div class="card-alert-box">' +
                        '<span class="card-label" style="color:#b91c1c;">\u26a0\ufe0f Clinical Alert</span>' +
                        '<div class="card-fact">' + item.alert + '</div>' +
                    '</div>' +
                '</div>';
        }

        window.openCards = function(startIdx) {
            var data = contentData[currentTab];
            cardIndex = (typeof startIdx === 'number') ? startIdx : 0;
            renderCardInModal(data.data[cardIndex], data, cardIndex, data.data.length);
            document.getElementById('card-modal').style.display = 'flex';
        };
        window.prevCard = function() {
            var data = contentData[currentTab];
            if (cardIndex > 0) { cardIndex--; renderCardInModal(data.data[cardIndex], data, cardIndex, data.data.length); }
        };
        window.nextCard = function() {
            var data = contentData[currentTab];
            if (cardIndex < data.data.length - 1) { cardIndex++; renderCardInModal(data.data[cardIndex], data, cardIndex, data.data.length); }
        };
        window.closeCards = function() {
            document.getElementById('card-modal').style.display = 'none';
        };

        function renderFocusCard(item, data) {
            if (!item || !data) return '';
            return `
                <div class="focus-card" style="border-color:${getComputedStyle(document.documentElement).getPropertyValue('--' + data.color.split('-')[1])};">
                    <div class="focus-card-header ${data.color}">
                        Study Card
                    </div>
                    <div class="focus-card-body">
                        <div>
                            <span class="focus-label">Topic</span>
                            <div class="focus-content" style="font-weight:800; font-size:1.3rem;">${item.topic}</div>
                        </div>
                        <div>
                            <span class="focus-label">Key Fact</span>
                            <div class="focus-content">${item.fact}</div>
                        </div>
                        <div class="focus-alert-box">
                            <span class="focus-label" style="color:#b91c1c;">⚠️ Clinical Alert</span>
                            <div class="focus-content" style="font-size:1rem;">${item.alert}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.switchTab = function(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = 'tab-btn'; // Reset
                if(btn.id === `tab-${tabName}`) {
                    btn.classList.add('active');
                    if(contentData[tabName]) btn.classList.add(contentData[tabName].color);
                } else {
                    var bKey = btn.id.replace('tab-','');
                    if(contentData[bKey]) btn.classList.add(contentData[bKey].color);
                }
            });
            if (contentData[currentTab] && contentData[currentTab].data && contentData[currentTab].data.length > 0) {
                currentItem = contentData[currentTab].data[0];
                renderGuide();
            }
        }

        function renderGuide() {
            const container = document.getElementById('content-area');
            const data = contentData[currentTab];
            
            if (!data || !data.data) return;

            const rows = data.data.map((item, idx) => `
                <tr onclick="selectRow(this, ${idx})" class="${currentItem === item ? 'selected' : ''}">
                    <td class="topic-cell ${data.type}">${item.topic}</td>
                    <td class="key-point-cell">${item.fact}</td>
                    <td class="alert-cell">${item.alert}</td>
                </tr>
            `).join('');

            const content = `
                <div class="section-header-bar ${data.color}">
                    <span>${data.title}</span>
                    <div class="header-btns">
                        <button class="header-btn" style="display:none;" id="mobile-card-btn" onclick="openCards(0)">📄 Cards</button>
                        <button class="header-quiz-btn" onclick="startQuiz()">Take Quiz</button>
                    </div>
                </div>
                <div class="grid-layout">
                    <div>
                        <div class="table-container">
                            <table>
                                <thead><tr><th>Topic</th><th>Clinical Fact</th><th>Nursing Priority / Alerts</th></tr></thead>
                                <tbody id="table-body">${rows}</tbody>
                            </table>
                        </div>
                    </div>
                    <div>
                        <div class="visual-container" id="desktop-focus-card" style="background:none; border:none; padding-top:0;">
                            ${renderFocusCard(currentItem, data)}
                        </div>
                    </div>
                </div>
            `;
            if (container) {
                container.innerHTML = content;
            }

            if (window.innerWidth <= 600) {
                document.getElementById('mobile-card-btn').style.display = 'inline-block';
                document.getElementById('desktop-focus-card').style.display = 'none';
            }
        }

        window.selectRow = function(rowEl, index) {
            document.querySelectorAll('#table-body tr').forEach(function(r) { r.classList.remove('selected'); });
            rowEl.classList.add('selected');
            
            if (window.innerWidth <= 600) {
                openCards(index);
            } else {
                currentItem = contentData[currentTab].data[index];
                document.getElementById('desktop-focus-card').innerHTML = renderFocusCard(currentItem, contentData[currentTab]);
            }
        };

        window.startQuiz = function() {
            document.getElementById('quiz-modal').style.display = 'flex';
            currentQuizData = contentData[currentTab].data; 
            quizIndex = 0;
            quizScore = 0;
            loadQuestion();
        }

        window.closeQuiz = function() {
            document.getElementById('quiz-modal').style.display = 'none';
        }

        function loadQuestion() {
            if (!currentQuizData || currentQuizData.length === 0) return;
            const qData = currentQuizData[quizIndex];
            document.getElementById('q-num-display').innerText = quizIndex + 1;
            document.getElementById('quiz-progress').innerText = `Question ${quizIndex + 1} of ${currentQuizData.length}`;
            document.getElementById('q-text').innerText = qData.q;
            
            document.getElementById('feedback-area').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            
            const optionsContainer = document.getElementById('q-options');
            if (optionsContainer) {
                optionsContainer.innerHTML = '';

                let answerObjects = qData.a.map((ans, index) => ({ text: ans, originalIndex: index }));
                answerObjects = shuffleArray(answerObjects);

                const letters = ['A', 'B', 'C', 'D'];
                
                answerObjects.forEach((ansObj, idx) => {
                    const btn = document.createElement('div');
                    btn.className = 'quiz-option';
                    btn.dataset.originalIndex = ansObj.originalIndex;
                    
                    btn.innerHTML = `
                        <div class="quiz-option-letter ${letters[idx]}">${letters[idx]}</div> 
                        <div style="flex-grow:1;">${ansObj.text}</div>
                        <div class="correct-check" style="display:none; color:#10b981; font-weight:bold; font-size:1.2rem; margin-left:0.5rem;">✔</div>
                    `;
                    
                    btn.onclick = () => checkAnswer(ansObj.originalIndex, btn, optionsContainer);
                    optionsContainer.appendChild(btn);
                });
            }
        }

        window.checkAnswer = function(selectedOriginalIndex, btnElement, optionsContainer) {
            const qData = currentQuizData[quizIndex];
            const options = optionsContainer.querySelectorAll('.quiz-option');
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackHeader = document.getElementById('feedback-header');
            const rationaleText = document.getElementById('rationale-text');
            const nextBtn = document.getElementById('next-btn');

            options.forEach(opt => opt.style.pointerEvents = 'none');

            let visualCorrectLetter = 'A';
            let correctOptionDom = null;
            Array.from(options).forEach((opt, idx) => {
                if (parseInt(opt.dataset.originalIndex) === qData.correct) {
                    visualCorrectLetter = ['A', 'B', 'C', 'D'][idx];
                    correctOptionDom = opt;
                }
            });

            if (rationaleText) rationaleText.innerHTML = `<div class="rationale-pill">Rationale:</div><div style="color: #e2e8f0; font-size: 0.95rem;">${qData.rationale || "No rationale provided."}</div>`;
            if (feedbackArea) feedbackArea.style.display = 'block';
            if (nextBtn) nextBtn.style.display = 'block';

            let isCorrect = (selectedOriginalIndex === qData.correct);

            if (feedbackArea) feedbackArea.style.borderColor = isCorrect ? '#10b981' : '#ef4444';
            
            const statusBadge = isCorrect 
                ? '<span class="feedback-badge badge-correct">✔ Correct</span>' 
                : '<span class="feedback-badge badge-incorrect">✖ Incorrect</span>';
            const answerBadge = `<span class="feedback-badge badge-answer">Answer: ${visualCorrectLetter}</span>`;

            if (feedbackHeader) {
                feedbackHeader.innerHTML = `${statusBadge} ${answerBadge}`;
            }

            if(isCorrect) {
                btnElement.classList.add('correct-choice');
                btnElement.querySelector('.correct-check').style.display = 'block';
                try { playSound('correct'); } catch(e){}
                quizScore++;
            } else {
                btnElement.classList.add('wrong-choice');
                if(correctOptionDom) {
                    correctOptionDom.classList.add('correct-choice');
                    correctOptionDom.querySelector('.correct-check').style.display = 'block';
                }
                try { playSound('wrong'); } catch(e){}
            }
            
            if (nextBtn) {
                if (quizIndex >= currentQuizData.length - 1) {
                    nextBtn.textContent = 'Finish (' + quizScore + '/' + currentQuizData.length + ')';
                } else {
                    nextBtn.textContent = 'Next Question';
                }
            }

            setTimeout(() => {
                const quizBox = document.querySelector('.quiz-box');
                if (quizBox) {
                    quizBox.scrollTo({
                        top: quizBox.scrollHeight,
                        behavior: 'smooth'
                    });
                }
            }, 100);
        }

        window.nextQuestion = function() {
            quizIndex++;
            if(quizIndex < currentQuizData.length) {
                loadQuestion();
                const quizBox = document.querySelector('.quiz-box');
                if (quizBox) quizBox.scrollTop = 0;
            } else {
                const optionsContainer = document.getElementById('q-options');
                const qText = document.getElementById('q-text');
                if (qText) qText.innerText = "Quiz Complete!";
                if (optionsContainer) {
                    optionsContainer.innerHTML = `
                        <div style="text-align:center; padding:2rem; background: rgba(255,255,255,0.05); border-radius: 1rem;">
                            <h2 style="font-size: 2rem; margin-bottom: 1rem; color: white;">You scored ${quizScore} / ${currentQuizData.length}</h2>
                            <button class="action-btn print-btn" style="width:100%; max-width: 300px; background-color: var(--accent-gold); color: white;" onclick="closeQuiz()">Return to Guide</button>
                        </div>
                    `;
                }
                const feedbackArea = document.getElementById('feedback-area');
                const nextBtn = document.getElementById('next-btn');
                const qNumDisplay = document.getElementById('q-num-display');
                if (feedbackArea) feedbackArea.style.display = 'none';
                if (nextBtn) nextBtn.style.display = 'none';
                if (qNumDisplay) qNumDisplay.style.display = 'none';
            }
        }

        window.addEventListener('resize', function() {
            if(document.getElementById('content-area').innerHTML !== "") {
                if (window.innerWidth <= 600) {
                    document.getElementById('mobile-card-btn').style.display = 'inline-block';
                    document.getElementById('desktop-focus-card').style.display = 'none';
                } else {
                    document.getElementById('mobile-card-btn').style.display = 'none';
                    document.getElementById('desktop-focus-card').style.display = 'flex';
                }
            }
        });

        // Init
        switchTab('rhythms'); 
    })();
    </script>
</div>
