<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📘 The Gold Rules</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; min-height: 100vh; min-height: 100dvh; background: #b8aad0; }
        html.dark, html.dark body { background: #0f172a; }
    </style>
</head>
<body>
<script>
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.classList.add('dark');
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(event) {
    if (event.matches) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }
});
</script>

<!-- Peptopia Klimek Guide Widget -->
<div id="peptopia-klimek-guide">
    <style>
        /* --- Scoped Styles --- */
        #peptopia-klimek-guide {
            --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
            --slate-700: #334155; --slate-800: #1e293b; --slate-900: #0f172a; --white: #ffffff;
            --rose-500: #fb7185; --blue-500: #06b6d4; --purple-500: #8b5cf6;
            --emerald-500: #10b981; --amber-500: #d97706; --pink-500: #ec4899; 
            --indigo-500: #6366f1; --orange-500: #f97316;
            
            /* Backgrounds (Pale versions for selection) */
            --rose-50: #fff1f2; --blue-50: #ecfeff; --purple-50: #f5f3ff;
            --emerald-50: #ecfdf5; --amber-50: #fffbeb; --pink-50: #fdf2f8; 
            --indigo-50: #eef2ff; --orange-50: #fff7ed;

            /* Alert Colors */
            --alert-bg: #fff7ed;
            --alert-border: #fdba74;
            --alert-text: #1e293b;
            
            /* UI Accents */
            --accent-gold: #f59e0b; 
            
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: transparent; color: var(--slate-900); line-height: 1.6;
            font-size: 16px; max-width: 76rem; margin: 0 auto; padding: 0.75rem;
            box-sizing: border-box; -webkit-text-size-adjust: 100%;
        }
        html.dark #peptopia-klimek-guide {
            --slate-50: #0f172a; --slate-100: #1e293b; --slate-200: #334155;
            --slate-700: #cbd5e1; --slate-800: #0f172a; --slate-900: #f1f5f9; --white: #1e293b;
            --rose-50: #1a0a0d; --blue-50: #0a1a1f; --purple-50: #0f0a1f;
            --emerald-50: #0a1a12; --amber-50: #1a150a; --pink-50: #1a0a14; 
            --indigo-50: #0a0e1f; --orange-50: #1a110a;
            --alert-bg: #1a150a; --alert-border: #92400e; --alert-text: #f1f5f9;
            background-color: transparent; color: #f1f5f9;
        }
        #peptopia-klimek-guide * { box-sizing: border-box; }
        
        #peptopia-klimek-guide .highlight-term {
            background-color: #fef08a; color: #000; padding: 0.1rem 0.4rem;
            border-radius: 0.25rem; font-weight: 800; display: inline-block; margin-bottom: 2px;
        }
        html.dark #peptopia-klimek-guide .highlight-term { background-color: #fde68a; color: #1e1b4b; }
        
        /* Navbar */
        #peptopia-klimek-guide .navbar {
            background: linear-gradient(135deg, #0a1628 0%, #0c2461 50%, #0a1628 100%);
            color: #fff; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 16px -2px rgba(10, 22, 40, 0.5), 0 0 20px rgba(30, 100, 255, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.25);
        }
        html.dark #peptopia-klimek-guide .navbar { background: linear-gradient(135deg, #020617 0%, #0c2461 50%, #020617 100%); border: 1px solid rgba(59, 130, 246, 0.3); }
        #peptopia-klimek-guide .nav-title { font-weight: 800; font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; text-align: center; }
        
        /* Tabs */
        #peptopia-klimek-guide .tabs-container {
            display: flex; flex-wrap: nowrap; gap: 0.5rem; margin-bottom: 0.5rem;
            overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 0.5rem; scrollbar-width: thin;
            justify-content: flex-start;
        }
        @media (min-width: 768px) { #peptopia-klimek-guide .tabs-container { justify-content: center; } }
        #peptopia-klimek-guide .tabs-container::-webkit-scrollbar { height: 4px; }
        #peptopia-klimek-guide .tabs-container::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        #peptopia-klimek-guide .tab-btn {
            padding: 0.6rem 1rem; border-radius: 0.5rem; font-weight: 700;
            border: none; cursor: pointer; transition: all 0.15s; font-size: 0.95rem;
            filter: grayscale(40%) opacity(0.9); text-align: center;
            white-space: nowrap; flex-shrink: 0; color: #fff;
        }
        #peptopia-klimek-guide .tab-btn:hover { filter: grayscale(0%) opacity(1); transform: translateY(-1px); }
        #peptopia-klimek-guide .tab-btn.active {
            filter: grayscale(0%) opacity(1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 0 0 2px rgba(255,255,255,0.3);
            transform: translateY(1px);
        }

        /* Tab Colors */
        #peptopia-klimek-guide #tab-gold { background-color: var(--rose-500); }
        #peptopia-klimek-guide #tab-guessing { background-color: var(--blue-500); }
        #peptopia-klimek-guide #tab-triage { background-color: var(--purple-500); }
        #peptopia-klimek-guide #tab-psych { background-color: var(--emerald-500); }
        #peptopia-klimek-guide #tab-medsurg { background-color: var(--amber-500); }

        /* Section Header Bar */
        #peptopia-klimek-guide .section-header-bar {
            padding: 0.35rem 1.5rem; color: white;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 0.5rem; font-size: 1.25rem; font-weight: 800;
            margin-bottom: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); gap: 0.5rem;
        }
        @media (max-width: 600px) {
            #peptopia-klimek-guide .section-header-bar { font-size: 1.1rem; padding: 0.35rem 1rem; flex-wrap: wrap; }
        }
        
        #peptopia-klimek-guide .header-btn {
            background-color: #312e81; color: white; border: 2px solid rgba(255,255,255,0.5);
            padding: 0.3rem 1rem; border-radius: 0.4rem; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s; white-space: nowrap; -webkit-tap-highlight-color: transparent;
        }
        #peptopia-klimek-guide .header-btn:hover { background-color: white; color: #312e81; transform: scale(1.02); }
        
        #peptopia-klimek-guide .header-quiz-btn {
            background-color: #312e81; color: white; border: 2px solid rgba(255,255,255,0.5);
            padding: 0.3rem 1rem; border-radius: 0.4rem;
            font-size: 0.9rem; font-weight: 700; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        #peptopia-klimek-guide .header-quiz-btn:hover {
            background-color: white; color: #312e81; transform: scale(1.02);
        }
        
        #peptopia-klimek-guide .header-btns { display: flex; gap: 0.5rem; flex-shrink: 0; }

        /* Card Overlay & Modal */
        #peptopia-klimek-guide .card-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.92); z-index: 1999;
            align-items: flex-start; justify-content: center; padding: 0;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        #peptopia-klimek-guide .card-modal {
            background: var(--white); width: 100%; max-width: 560px; border-radius: 0;
            min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column;
        }
        @media (min-width: 640px) {
            #peptopia-klimek-guide .card-overlay { align-items: center; padding: 1.5rem; }
            #peptopia-klimek-guide .card-modal { border-radius: 1rem; min-height: auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        }
        html.dark #peptopia-klimek-guide .card-modal { background: #1e293b; }
        #peptopia-klimek-guide .card-modal-header {
            padding: 0.75rem 1rem; color: white; font-weight: 800; font-size: 1rem;
            display: flex; justify-content: space-between; align-items: center; border-radius: 0;
        }
        @media (min-width: 640px) { #peptopia-klimek-guide .card-modal-header { border-radius: 1rem 1rem 0 0; } }
        #peptopia-klimek-guide .card-modal-header .card-close-btn {
            background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 0 0.25rem; line-height: 1;
        }
        #peptopia-klimek-guide .card-modal-body { padding: 1.25rem; flex-grow: 1; }
        #peptopia-klimek-guide .card-modal-body .card-topic { font-size: 1.35rem; font-weight: 800; margin-bottom: 1rem; color: var(--slate-900); }
        html.dark #peptopia-klimek-guide .card-modal-body .card-topic { color: #f1f5f9; }
        #peptopia-klimek-guide .card-modal-body .card-section { margin-bottom: 1rem; }
        #peptopia-klimek-guide .card-modal-body .card-label {
            font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px;
            color: #64748b; font-weight: 800; margin-bottom: 0.3rem; display: block;
        }
        html.dark #peptopia-klimek-guide .card-modal-body .card-label { color: #94a3b8; }
        #peptopia-klimek-guide .card-modal-body .card-fact { font-size: 1.05rem; line-height: 1.5; color: var(--slate-900); }
        html.dark #peptopia-klimek-guide .card-modal-body .card-fact { color: #e2e8f0; }
        #peptopia-klimek-guide .card-modal-body .card-alert-box {
            background: #fff1f2; border-left: 5px solid #e11d48; padding: 0.75rem; border-radius: 0.25rem;
        }
        html.dark #peptopia-klimek-guide .card-modal-body .card-alert-box { background: #1c1012; border-left-color: #be123c; }
        #peptopia-klimek-guide .card-modal-body .card-alert-box .card-fact { font-size: 0.95rem; }
        #peptopia-klimek-guide .card-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem 1rem; border-top: 1px solid var(--slate-200); gap: 0.5rem;
        }
        html.dark #peptopia-klimek-guide .card-nav { border-top-color: #334155; }
        #peptopia-klimek-guide .card-nav-btn {
            background: #4f46e5; color: white; border: none; padding: 0.55rem 1.25rem;
            border-radius: 2rem; font-weight: 700; cursor: pointer; font-size: 0.9rem;
            transition: background 0.15s; -webkit-tap-highlight-color: transparent;
        }
        #peptopia-klimek-guide .card-nav-btn:hover { background: #4338ca; }
        #peptopia-klimek-guide .card-nav-btn:disabled { opacity: 0.35; cursor: default; }
        #peptopia-klimek-guide .card-counter { font-size: 0.85rem; font-weight: 700; color: #64748b; white-space: nowrap; }
        html.dark #peptopia-klimek-guide .card-counter { color: #94a3b8; }

        /* Main Grid */
        #peptopia-klimek-guide .grid-layout { display: flex; flex-direction: column; gap: 1.5rem; align-items: flex-start; } 
        @media (min-width: 850px) {
            #peptopia-klimek-guide .grid-layout { flex-direction: row; }
            #peptopia-klimek-guide .grid-layout > div:first-child { flex: 2; width: 100%; } /* Left Col */
            #peptopia-klimek-guide .grid-layout > div:last-child { flex: 1; width: 100%; position: sticky; top: 1rem; }  /* Right Col */
        }

        /* Description Box */
        #peptopia-klimek-guide .description-box {
            padding: 1rem; background: #ffffff; 
            border: 2px solid #e2e8f0; border-radius: 0.5rem;
            border-left: 6px solid var(--slate-700);
            font-size: 1.05rem; color: #000000; font-weight: 500;
            margin-bottom: 1.5rem;
        }

        /* Data Table */
        #peptopia-klimek-guide .table-container { 
            overflow-x: auto; -webkit-overflow-scrolling: touch; 
            border: 2px solid #334155; border-radius: 0.75rem; 
            background: white; max-height: 600px; overflow-y: auto; 
        }
        html.dark #peptopia-klimek-guide .table-container { background: #1e293b; border-color: #475569; }
        #peptopia-klimek-guide table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        #peptopia-klimek-guide th { 
            padding: 0.75rem; background-color: #f1f5f9; color: #0f172a; 
            border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 5; 
            font-weight: 800; font-size: 0.9rem;
        }
        html.dark #peptopia-klimek-guide th { background-color: #334155; color: #f1f5f9; border-bottom-color: #475569; }
        #peptopia-klimek-guide td { padding: 0.75rem; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
        html.dark #peptopia-klimek-guide td { border-bottom-color: #334155; color: #e2e8f0; }
        #peptopia-klimek-guide tr:hover td { cursor: pointer; background-color: #f8fafc; filter: brightness(98%); }
        html.dark #peptopia-klimek-guide tr:hover td { background-color: #1e293b; }
        #peptopia-klimek-guide tr.selected td { border-left: 5px solid var(--accent-gold); background-color: #fffbeb; }
        html.dark #peptopia-klimek-guide tr.selected td { background-color: #1c1917; }

        /* Cell Specifics */
        #peptopia-klimek-guide .topic-cell { font-weight: 800; width: 1%; white-space: nowrap; color: #000; vertical-align: top; }
        html.dark #peptopia-klimek-guide .topic-cell { color: #f1f5f9; }
        #peptopia-klimek-guide .topic-cell.gold { background-color: var(--rose-50); }
        #peptopia-klimek-guide .topic-cell.guessing { background-color: var(--blue-50); }
        #peptopia-klimek-guide .topic-cell.triage { background-color: var(--purple-50); }
        #peptopia-klimek-guide .topic-cell.psych { background-color: var(--emerald-50); }
        #peptopia-klimek-guide .topic-cell.medsurg { background-color: var(--amber-50); }

        #peptopia-klimek-guide .key-point-cell { color: #334155; font-style: normal; font-weight: 500; }
        html.dark #peptopia-klimek-guide .key-point-cell { color: #cbd5e1; }
        #peptopia-klimek-guide .alert-cell { color: #991b1b; background-color: #fef2f2; border-left: 3px solid #f87171; font-weight: 600; }
        html.dark #peptopia-klimek-guide .alert-cell { background-color: #1c1012; color: #fca5a5; border-left-color: #dc2626; }

        @media (max-width: 600px) {
            #peptopia-klimek-guide .table-container { max-height: none; }
            #peptopia-klimek-guide table, #peptopia-klimek-guide thead, #peptopia-klimek-guide tbody,
            #peptopia-klimek-guide th, #peptopia-klimek-guide td, #peptopia-klimek-guide tr { display: block; width: 100%; }
            #peptopia-klimek-guide thead { display: none; }
            #peptopia-klimek-guide tr { border-bottom: 2px solid #e2e8f0; padding: 0.6rem 0; margin-bottom: 0.35rem; }
            html.dark #peptopia-klimek-guide tr { border-bottom-color: #334155; }
            #peptopia-klimek-guide td { padding: 0.3rem 0.65rem; border-bottom: none; position: relative; padding-left: 0.65rem; }
            #peptopia-klimek-guide .topic-cell { font-size: 1.05rem; padding-bottom: 0.15rem; white-space: normal; }
            #peptopia-klimek-guide .key-point-cell::before { content: '📌 '; }
            #peptopia-klimek-guide .alert-cell {
                border-left: 3px solid #f87171; margin: 0.2rem 0.3rem;
                border-radius: 0.25rem; padding: 0.4rem 0.6rem; font-size: 0.85rem;
            }
            #peptopia-klimek-guide tr.selected td { border-left: none; }
            #peptopia-klimek-guide tr.selected { border-left: 4px solid var(--accent-gold); background: #fffbeb; border-radius: 0.5rem; }
            html.dark #peptopia-klimek-guide tr.selected { background: #1c1917; }
        }

        /* Focus Card */
        #peptopia-klimek-guide .focus-card {
            background-color: white; border: 2px solid; 
            border-radius: 0.75rem; min-height: 250px;
            display: flex; flex-direction: column; 
            padding: 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        html.dark #peptopia-klimek-guide .focus-card { background: #1e293b; }
        #peptopia-klimek-guide .focus-card-header {
            padding: 0.75rem 1rem; border-radius: 0.55rem 0.55rem 0 0; color: white; font-weight: 800; font-size: 1.1rem; text-align: center;
        }
        #peptopia-klimek-guide .focus-card-body { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; gap: 1.5rem; }
        #peptopia-klimek-guide .focus-label {
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #64748b; font-weight: 800; margin-bottom: 0.25rem; display: block;
        }
        html.dark #peptopia-klimek-guide .focus-label { color: #94a3b8; }
        #peptopia-klimek-guide .focus-content { font-size: 1.15rem; color: #000; line-height: 1.4; }
        html.dark #peptopia-klimek-guide .focus-content { color: #f1f5f9; }
        #peptopia-klimek-guide .focus-alert-box {
            background-color: #fff1f2; border-left: 5px solid #e11d48; padding: 1rem; border-radius: 0.25rem;
        }
        html.dark #peptopia-klimek-guide .focus-alert-box { background: #1c1012; border-left-color: #be123c; }

        /* Quiz Styles */
        #peptopia-klimek-guide .quiz-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.96); z-index: 2000; 
            align-items: flex-start; justify-content: center; padding: 0;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        #peptopia-klimek-guide .quiz-box {
            background: #1e1b4b; /* Dark Blue/Slate */
            width: 100%; max-width: 800px; padding: 2rem; border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #4338ca;
            color: white; display: flex; flex-direction: column;
            max-height: 90vh; overflow-y: auto;
            scroll-behavior: smooth;
        }
        #peptopia-klimek-guide .quiz-question-number {
            background: #4338ca; width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; margin-right: 1rem; flex-shrink: 0; font-size: 1rem;
        }
        #peptopia-klimek-guide .quiz-header-row { display: flex; align-items: flex-start; margin-bottom: 1.5rem; }
        #peptopia-klimek-guide .quiz-question-text { font-size: 1.2rem; line-height: 1.5; font-weight: 500; }
        
        #peptopia-klimek-guide .quiz-option {
            background: #312e81; border: 2px solid #4338ca; padding: 1rem; margin-bottom: 0.75rem;
            border-radius: 0.5rem; cursor: pointer; transition: all 0.15s;
            display: flex; align-items: center; font-size: 1.05rem; color: #e0e7ff;
            width: 100%; text-align: left; -webkit-tap-highlight-color: transparent; user-select: none;
        }
        #peptopia-klimek-guide .quiz-option:hover { background: #3730a3; border-color: #6366f1; }
        @media (hover: none) {
            #peptopia-klimek-guide .quiz-option:hover { background: #312e81; border-color: #4338ca; }
            #peptopia-klimek-guide .quiz-option:active { background: #3730a3; border-color: #6366f1; }
        }
        #peptopia-klimek-guide .quiz-option.correct-choice { background: #064e3b; border-color: #10b981; color: white; }
        #peptopia-klimek-guide .quiz-option.wrong-choice { background: #7f1d1d; border-color: #ef4444; color: white; opacity: 0.85; }
        
        #peptopia-klimek-guide .quiz-option-letter {
            background: rgba(255,255,255,0.1); width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-right: 1rem; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;
        }

        #peptopia-klimek-guide .feedback-container {
            margin-top: 1.5rem; background: #312e81; border-radius: 0.5rem; border: 1px solid #4338ca; overflow: hidden; display: none;
        }
        #peptopia-klimek-guide .feedback-header {
            padding: 0.75rem 1rem; font-weight: 800; display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem;
        }
        #peptopia-klimek-guide .feedback-header.correct { background: #065f46; color: #34d399; }
        #peptopia-klimek-guide .feedback-header.incorrect { background: #7f1d1d; color: #fca5a5; }
        #peptopia-klimek-guide .feedback-content { padding: 1.25rem; font-size: 1.05rem; line-height: 1.6; color: #e0e7ff; }
        #peptopia-klimek-guide .rationale-label { color: #a5b4fc; font-weight: 800; display: block; margin-bottom: 0.5rem; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        
        #peptopia-klimek-guide .quiz-footer {
            margin-top: 2rem; display: flex; justify-content: center; align-items: center;
            padding-bottom: env(safe-area-inset-bottom, 1.5rem);
        }
        #peptopia-klimek-guide .next-q-btn {
            background: #4f46e5; color: white; border: none; padding: 0.85rem 2.5rem;
            border-radius: 2rem; font-weight: 800; cursor: pointer;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4); font-size: 1.1rem;
            -webkit-tap-highlight-color: transparent; width: 100%; max-width: 320px;
        }
        #peptopia-klimek-guide .next-q-btn:hover { background: #4338ca; }

        @media (max-width: 600px) {
             #peptopia-klimek-guide .quiz-box { padding: 1.25rem; max-height: 80vh; width: 95%; margin: 1rem auto; border-radius: 1rem; min-height: auto;}

    <script>
    (function() {
        // --- DATA FOR KLIMEK MAKE-UP ---
        const contentData = {
            gold: {
                title: 'The Gold Rules',
                color: 'bg-rose',
                type: 'gold',
                description: 'NCLEX assumptions, absolute rules, and patient-first strategies.',
                data: [
                    { topic: 'Utopia General Hospital', fact: 'The NCLEX takes place in a perfect world.', alert: 'Assume you have all the time, resources, and staff you need.', q: 'You are answering a question about a complex procedure. What should you assume about your resources?', a: ['I have all the equipment, time, and staff needed to perform it perfectly.', 'I am short-staffed and must cut corners.', 'I must ask the charge nurse for permission first.', 'I need to delegate it immediately to save time.'], correct: 0, rationale: 'The NCLEX tests your knowledge of the *ideal* standard of care. Never pick an answer based on real-world staffing shortages or lack of equipment.' },
                    { topic: 'Reading into Questions', fact: '<span class="highlight-term">Do not</span> read into the question.', alert: 'Never assume anything that is not specifically mentioned.', q: 'A question states: "A diabetic patient reports feeling dizzy." What should the nurse avoid doing?', a: ['Assuming the patient missed a meal or took too much insulin without further data.', 'Checking their blood glucose level.', 'Asking the patient about their symptoms.', 'Documenting the finding.'], correct: 0, rationale: 'Do not add extra meaning or make up a backstory (like "they probably skipped breakfast") to validate choosing an answer. Stick only to the facts provided.' },
                    { topic: 'Avoiding Absolutes', fact: 'Biology is rarely absolute.', alert: 'Avoid answers with words like: always, never, must, all, none.', q: 'Which of the following answer choices is statistically most likely to be INCORRECT?', a: ['"The nurse must ALWAYS administer this medication at 0800."', '"The patient may frequently experience nausea."', '"This condition usually resolves in a week."', '"The nurse should often monitor blood pressure."'], correct: 0, rationale: 'Absolute words (always, never, must) are usually traps because there are almost always exceptions in medicine.' },
                    { topic: 'Assess vs. Implement', fact: 'Assess the client <span class="highlight-term">first</span> before taking action.', alert: 'Rule: Assess UNLESS the patient is in severe, immediate distress.', q: 'A patient is admitted with a new diagnosis of heart failure. The physician orders an IV diuretic. What is the nurse\'s FIRST action?', a: ['Assess the patient\'s current lung sounds and vital signs', 'Administer the IV diuretic immediately', 'Call the pharmacy to verify the dose', 'Place the patient in a prone position'], correct: 0, rationale: 'Always assess the baseline first before implementing a new treatment, unless the question explicitly states they are actively coding or in severe distress.' },
                    { topic: 'Patient vs. Machine', fact: 'Priority goes to the <span class="highlight-term">patient</span>, not the equipment.', alert: 'Fix the patient first.', q: 'A fetal heart monitor is alarming and showing a flat line. What is the nurse\'s FIRST action?', a: ['Auscultate the fetal heart rate manually on the mother\'s abdomen', 'Unplug the monitor and reboot it', 'Check the connections on the machine', 'Call maintenance to fix the monitor'], correct: 0, rationale: 'Always assess the actual patient (the mother/fetus) before you start troubleshooting the machine. The machine might just be broken, or the patient could be dead.' },
                    { topic: 'The "First Time" Rule', fact: 'If it is the FIRST time doing something, the <span class="highlight-term">RN</span> must do it.', alert: 'Applies to vitals on admission, transfers, or new medications.', q: 'A patient is being transferred from the ICU to the Med-Surg floor. Who must take the first set of vital signs?', a: ['The Registered Nurse (RN)', 'The Unlicensed Assistive Personnel (UAP)', 'The Licensed Practical Nurse (LPN)', 'The physician'], correct: 0, rationale: 'The first set of vitals establishes the new baseline and requires high-level assessment and judgment, which cannot be delegated.' }
                ]
            },
            guessing: {
                title: 'Advanced Guessing',
                color: 'bg-blue',
                type: 'guessing',
                description: 'Tie-breakers, the 72-hour rule, and SATA strategies.',
                data: [
                    { topic: 'Worst Consequence Game', fact: 'Used when asked "Which need is the highest priority" for a <span class="highlight-term">SINGLE</span> patient.', alert: 'Pick the answer that causes the worst outcome if ignored.', q: 'A patient has a broken leg. The nurse can only perform one assessment right now. Which assessment is the highest priority?', a: ['Checking distal pulses and capillary refill', 'Assessing the patient\'s pain level', 'Checking the patient\'s temperature', 'Assessing their range of motion'], correct: 0, rationale: 'Play the worst consequence game: If you don\'t check pain, they hurt. If you don\'t check temp, they might have a mild fever. If you don\'t check pulses, they lose their leg. Loss of limb is the worst consequence.' },
                    { topic: 'SATA Changes', fact: 'Select All That Apply can now be <span class="highlight-term">just one</span> answer, or <span class="highlight-term">all of them</span>.', alert: 'Treat every single option as a True/False question independently.', q: 'When evaluating a Select All That Apply (SATA) question, what is the best strategy?', a: ['Evaluate each option individually as a True/False statement', 'Always pick at least two answers', 'Never pick all of the answers', 'Group similar answers together and pick them as a block'], correct: 0, rationale: 'The NCLEX rules have changed. Do not group them. Look at Option A: Is it true? Yes/No. Look at Option B: Is it true? Yes/No. Move down the list.' },
                    { topic: 'The Headache Rule', fact: 'If "Headache" is an option on a SATA question, it is almost always a good thing to check.', alert: 'Headache is a universal symptom for many critical issues.', q: 'You are presented with a SATA question about the side effects of a new medication you have never heard of. One of the options is "Headache." Should you select it?', a: ['Yes, headache is a highly common side effect and a good guess on SATA', 'No, only select it if you know the drug', 'No, headache is too vague', 'Yes, but only if it says "severe headache"'], correct: 0, rationale: 'Headache, much like nausea and vomiting, is a statistically excellent guess when you are unsure on a SATA question.' },
                    { topic: 'The 72-Hour Infection Rule', fact: 'NEVER pick "Infection" as a priority in the first <span class="highlight-term">72 hours</span> of anything.', alert: 'Infection takes time to incubate and present.', q: 'A patient is 24 hours post-op from an appendectomy. Which finding is the LEAST likely to be the correct priority answer?', a: ['A surgical site infection', 'Hemorrhage from the incision', 'A deep vein thrombosis', 'Atelectasis'], correct: 0, rationale: 'It takes roughly 3 days (72 hours) for bacteria to incubate and create a clinical infection. In the first 24 hours, prioritize bleeding or respiratory issues.' },
                    { topic: 'Sesame Street Rule', fact: 'Right answers tend to look <span class="highlight-term">different</span> from the others.', alert: 'Only use this as an absolute last resort if you have no idea.', q: 'Three answer choices suggest restricting the patient\'s movement, while one suggests offering them a choice of activity. What rule applies?', a: ['The Sesame Street Rule (One of these things is not like the other)', 'The Umbrella Strategy', 'The Acute vs Chronic Rule', 'The Vital Organ Rule'], correct: 0, rationale: 'If three options share the exact same theme (restriction), they cancel each other out because the NCLEX only has one right answer. The unique option is likely correct.' },
                    { topic: 'Ignorance vs Knowledge', fact: 'Do not answer based on the one word you don\'t know.', alert: 'Pull the unknown drug out and answer based on the general route/procedure.', q: 'A question asks: "Which of the following is important when administering an Amikacin IV piggyback?" You don\'t know what Amikacin is. What do you do?', a: ['Answer based on the standard rules for administering ANY IV piggyback (e.g., use an IV pump)', 'Assume it is a lethal poison and pick the most extreme answer', 'Skip the question', 'Guess randomly'], correct: 0, rationale: 'Don\'t let one unknown drug name derail you. You know that all IV piggybacks require a pump/controller. Use the knowledge you DO have.' }
                ]
            },
            triage: {
                title: 'Triage & Codes',
                color: 'bg-purple',
                type: 'triage',
                description: 'Mass casualty triage, CPR rules, and critical vital signs.',
                data: [
                    { topic: 'Disaster Triage Paradigm', fact: 'In a mass casualty, treat those with the <span class="highlight-term">greatest chance to live</span> FIRST.', alert: 'This is the exact opposite of normal ER triage (where the worst goes first).', q: 'In a disaster triage scenario (e.g., a train derailment), which patient is treated first?', a: ['A patient with a treatable airway obstruction and a high chance of survival', 'A patient with an open head injury and exposed brain matter', 'A patient with full-body 90% burns', 'A patient in cardiac arrest'], correct: 0, rationale: 'In a disaster, resources are limited. You do not spend time doing CPR on one dying patient when you could save 10 others with minor interventions. Red tags (immediate but salvageable) go first.' },
                    { topic: 'Disaster Triage Assessment', fact: 'The standard assessment sequence still applies.', alert: 'Check Airway, Breathing, Circulation, then LOC.', q: 'What is the correct sequence of assessment during disaster triage?', a: ['Check airway/breathing/circulation, assess LOC, inspect for gross deformities/bleeding', 'Assess for broken bones, check airway, ask for their name', 'Check their ID, assess airway, check for bleeding', 'Perform a full head-to-toe assessment on each patient'], correct: 0, rationale: 'ABCs always come first. Then Level of Consciousness. Then a quick visual sweep for massive bleeding. Speed is critical.' },
                    { topic: 'Code Blue / CPR', fact: 'Basic CPR should be effectively performed <span class="highlight-term">until</span> the crash cart arrives.', alert: 'Do not delay compressions to wait for equipment.', q: 'A patient is found pulseless and apneic. A colleague goes to get the crash cart. What is your action?', a: ['Begin basic CPR (chest compressions) immediately', 'Wait for the crash cart to arrive so you have oxygen', 'Check the patient\'s chart for their code status', 'Leave the room to find a doctor'], correct: 0, rationale: 'High-quality chest compressions must start instantly. The cart will arrive shortly, but the brain is dying now without circulation.' },
                    { topic: 'Mean Arterial Pressure (MAP)', fact: 'Normal MAP is <span class="highlight-term">70-105 mm Hg</span>.', alert: 'A MAP < 60 will not allow for adequate perfusion of vital organs.', q: 'A patient\'s vital signs monitor shows a MAP of 55 mm Hg. What is the nurse\'s interpretation?', a: ['The MAP is critically low; vital organs are not being adequately perfused', 'The MAP is normal', 'The MAP is dangerously high; the patient is at risk for a stroke', 'The MAP is borderline, recheck in an hour'], correct: 0, rationale: 'A MAP of at least 60-65 is strictly required to push blood into the coronary arteries and the brain. 55 is a medical emergency (shock).' },
                    { topic: 'Peak Flow (Asthma)', fact: '80% or higher = Stable/Good Control.', alert: '50-79% = Caution. <span class="highlight-term">< 50%</span> = Medical Alert!', q: 'An asthmatic patient reports a peak flow reading of 45% of their personal best. What does this mean?', a: ['This is a medical alert; the patient needs immediate rescue intervention', 'This is caution; they should use their inhaler and rest', 'This is stable; their asthma is in good control', 'This is a mild exacerbation'], correct: 0, rationale: 'Anything below 50% on a peak flow meter indicates severe, life-threatening bronchoconstriction.' },
                    { topic: 'Troponin Levels', fact: 'Elevation indicates myocardial injury (Heart Attack).', alert: 'Normal Troponin I < 0.5. Normal Troponin T < 0.1.', q: 'A patient with chest pain has a Troponin I level of 2.4. What does this indicate?', a: ['Myocardial injury or infarction (heart attack)', 'Normal cardiac function', 'A pulmonary embolism', 'Severe skeletal muscle damage'], correct: 0, rationale: 'Troponin is a highly specific cardiac enzyme. Levels above the normal threshold (0.5 for I, 0.1 for T) are diagnostic for cardiac muscle death.' }
                ]
            },
            psych: {
                title: 'Psych & Staff Comm',
                color: 'bg-emerald',
                type: 'psych',
                description: 'Klimek 12: Conversion disorders, suicide risks, and professional communication.',
                data: [
                    { topic: 'Conversion Disorder', fact: 'Patients experience real physical symptoms (like blindness/paralysis) with <span class="highlight-term">no organic cause</span>.', alert: 'Do NOT tell them it is fake. Assist them in coping.', q: 'A patient with a conversion disorder suddenly cannot walk, though all neurological scans are normal. What is the best nursing intervention?', a: ['Assist the patient in learning ways to cope and live with the disability', 'Tell the patient there is nothing physically wrong with them', 'Ignore the symptom so you don\'t reinforce it', 'Demand they try to walk to prove they can'], correct: 0, rationale: 'The symptom is 100% real to the patient. Confronting them or calling it fake will drastically increase their anxiety. You must help them cope with the symptom as it presents.' },
                    { topic: 'Suicide Risk Factors', fact: 'A <span class="highlight-term">family history of completed suicide</span> is a massive risk factor.', alert: 'Always ask directly: "Do you have a plan?"', q: 'During a psychiatric intake, which piece of history puts the client at the absolute highest risk for suicide?', a: ['A family history of a completed suicide', 'A history of mild depression', 'Recent job loss', 'Divorce within the last year'], correct: 0, rationale: 'While job loss and divorce are stressors, a family history of a completed suicide dramatically increases the statistical likelihood that the patient will also attempt it.' },
                    { topic: 'Delegating Psych Patients', fact: 'Avoid assigning highly <span class="highlight-term">psychotic</span> patients to brand new RNs.', alert: 'They require advanced therapeutic communication and can be threatening.', q: 'A charge nurse is making assignments for a newly licensed RN. Which patient should the charge nurse AVOID giving to the new RN?', a: ['A patient with severe, acute schizophrenia experiencing command hallucinations', 'A patient with mild depression', 'A patient with Generalized Anxiety Disorder', 'A patient recovering from a suicide attempt 3 days ago'], correct: 0, rationale: 'Acutely psychotic patients can be incredibly unpredictable and threatening. A new RN does not yet have the clinical experience to safely de-escalate these complex scenarios.' },
                    { topic: 'Staff Conflict Communication', fact: 'Never say "You". Always use <span class="highlight-term">"I" statements</span>.', alert: 'Removes accusation and focuses on how the behavior impacts the unit.', q: 'A nurse manager needs to confront a staff nurse who is constantly late. What is the most therapeutic way to begin the conversation?', a: ['"I feel concerned when the shift starts and there is not enough staff on the floor."', '"You are always late and it is unacceptable."', '"Why do you keep arriving 15 minutes past your shift?"', '"You need to start respecting your coworkers\' time."'], correct: 0, rationale: 'Using "You" or "Why" puts the person immediately on the defensive. "I" statements own the feeling and open the door for constructive dialogue.' },
                    { topic: 'Alcohol Rehab Prerequisite', fact: 'Before someone enters a psychological rehab program, they must undergo <span class="highlight-term">medical detoxification</span>.', alert: 'Withdrawal can be fatal (Delirium Tremens).', q: 'A patient with severe, chronic alcoholism wants to be transferred to a psychiatric rehabilitation facility to talk about their addiction. What must happen first?', a: ['They must complete a medically-supervised physical detoxification', 'They must sign a contract promising not to drink', 'They must attend an AA meeting', 'They must undergo a psychiatric evaluation'], correct: 0, rationale: 'You cannot do psychiatric therapy with a patient who is actively going into physical withdrawal. Medical detox (preventing seizures/DTs) must happen before rehab.' },
                    { topic: 'Taking Care of Yourself', fact: 'A mind that is fried is not a good use of time.', alert: 'If you reach question 76 (or 86 for PN), DO NOT PANIC.', q: 'You are taking the NCLEX and the computer gives you question number 76. What should your mindset be?', a: ['"I am still in the game. I have perseverance and strength of character."', '"I must be failing because it didn\'t shut off at 75."', '"I should rush through the rest of the questions."', '"I am going to fail."'], correct: 0, rationale: 'Negativity will destroy your critical thinking. If the test gives you another question, it means you are still actively passing and it just needs more data. Stay positive.' }
                ]
            },
            medsurg: {
                title: 'Stray Med-Surg Pearls',
                color: 'bg-amber',
                type: 'medsurg',
                description: 'High-yield miscellaneous Klimek facts not covered in other lectures.',
                data: [
                    { topic: 'Abdominal Aortic Aneurysm', fact: 'Presents as a <span class="highlight-term">pulsating mass</span> in the abdomen.', alert: 'The primary concern is immediate RUPTURE.', q: 'While assessing a patient\'s abdomen, the nurse notes a visible, pulsating mass near the umbilicus. What is the greatest risk to this patient?', a: ['Rupture of an abdominal aortic aneurysm', 'Bowel obstruction', 'Peritonitis', 'Gastric ulcer perforation'], correct: 0, rationale: 'A pulsating mass is the classic sign of an AAA. Palpating it forcefully or ignoring it can lead to a catastrophic, fatal rupture.' },
                    { topic: 'Restraints: Tying Knots', fact: 'Restraints must be tied using <span class="highlight-term">quick-release knots</span>.', alert: 'Must be tied to a STATIONARY portion of the bed frame, never the side rails.', q: 'A patient is placed in bilateral wrist restraints. Where and how should the nurse tie the straps?', a: ['To a stationary part of the bed frame using a quick-release slip knot', 'To the side rails using a secure square knot', 'To the mattress using a double knot', 'To the headboard using a zip tie'], correct: 0, rationale: 'Tying to a side rail will break the patient\'s arm if the rail is lowered. It must be a stationary frame part. The knot must be quick-release in case of emergency (fire/CPR).' },
                    { topic: 'Restraints: Assessment', fact: 'Distal pulses and skin integrity must be checked constantly.', alert: 'Restraints are rarely a planned event; they are an emergency intervention.', q: 'After applying wrist restraints, what is a mandatory, frequent nursing assessment?', a: ['Checking distal pulses, capillary refill, and skin temperature', 'Assessing the patient\'s lung sounds', 'Checking the patient\'s pupil response', 'Asking the patient if they are comfortable'], correct: 0, rationale: 'Restraints can cut off circulation. Neurovascular checks (pulses, color, cap refill) distal to the restraint are a strict legal requirement.' },
                    { topic: 'Uric Acid Levels', fact: 'Normal range is <span class="highlight-term">4.0 - 8.5</span>.', alert: 'Elevated levels indicate Gout or kidney issues.', q: 'A patient presents with severe joint pain in their big toe. Their lab work shows a uric acid level of 10.2. What condition does this support?', a: ['Gout', 'Rheumatoid Arthritis', 'Osteoarthritis', 'Lupus'], correct: 0, rationale: 'Normal uric acid is up to 8.5. A level of 10.2 indicates hyperuricemia, which causes uric acid crystals to deposit in the joints (classic Gout).' },
                    { topic: 'Absolute Neutrophil Count (ANC)', fact: 'Normal is 1500 - 8000.', alert: 'If ANC is <span class="highlight-term">< 500</span>, the patient is severely immunocompromised.', q: 'A leukemia patient has an Absolute Neutrophil Count (ANC) of 300. What is the required nursing action?', a: ['Place the patient on strict Neutropenic Precautions', 'Place the patient on Bleeding Precautions', 'Place the patient in a negative pressure room', 'Allow normal visitation'], correct: 0, rationale: 'An ANC below 500 means the patient essentially has no immune system. They require strict reverse isolation (Neutropenic Precautions) to protect them from the environment.' },
                    { topic: 'Rapid Response Team (RRT)', fact: 'Call RRT when a patient is declining but <span class="highlight-term">still has a pulse and is breathing</span>.', alert: 'If they lose their pulse/airway, call a Code Blue.', q: 'A patient\'s heart rate suddenly jumps to 140, their BP drops to 80/40, and they become lethargic. They are still breathing. What should the nurse do?', a: ['Call the Rapid Response Team (RRT)', 'Call a Code Blue', 'Wait 15 minutes and recheck vitals', 'Administer Epinephrine'], correct: 0, rationale: 'The purpose of the RRT is to intervene *before* the patient actually arrests. Since they still have a pulse/respirations but are rapidly deteriorating, RRT is the correct call.' }
                ]
            }
        };


        // --- Logic ---
        let currentTab = 'gold';
        let quizIndex = 0;
        let quizScore = 0;
        let currentQuizData = [];

        // Audio Context for Beeps
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- Study Card Modal Logic ---
        let cardIndex = 0;

        function renderCardInModal(item, data, idx, total) {
            document.getElementById('card-modal-header').className = 'card-modal-header ' + data.color;
            document.getElementById('card-modal-title').textContent = data.title + ' \u2014 Study Cards';
            document.getElementById('card-counter').textContent = (idx + 1) + ' / ' + total;
            document.getElementById('card-prev-btn').disabled = (idx === 0);
            document.getElementById('card-next-btn').disabled = (idx >= total - 1);
            document.getElementById('card-modal-body').innerHTML =
                '<div class="card-topic">' + item.topic + '</div>' +
                '<div class="card-section">' +
                    '<span class="card-label">Key Fact</span>' +
                    '<div class="card-fact">' + item.fact + '</div>' +
                '</div>' +
                '<div class="card-section">' +
                    '<div class="card-alert-box">' +
                        '<span class="card-label" style="color:#b91c1c;">\u26a0\ufe0f Clinical Alert</span>' +
                        '<div class="card-fact">' + item.alert + '</div>' +
                    '</div>' +
                '</div>';
        }

        window.openCards = function(startIdx) {
            var data = contentData[currentTab];
            cardIndex = (typeof startIdx === 'number') ? startIdx : 0;
            renderCardInModal(data.data[cardIndex], data, cardIndex, data.data.length);
            document.getElementById('card-modal').style.display = 'flex';
        };
        window.prevCard = function() {
            var data = contentData[currentTab];
            if (cardIndex > 0) { cardIndex--; renderCardInModal(data.data[cardIndex], data, cardIndex, data.data.length); }
        };
        window.nextCard = function() {
            var data = contentData[currentTab];
            if (cardIndex < data.data.length - 1) { cardIndex++; renderCardInModal(data.data[cardIndex], data, cardIndex, data.data.length); }
        };
        window.closeCards = function() {
            document.getElementById('card-modal').style.display = 'none';
        };

        window.switchTab = function(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(function(btn) {
                btn.className = 'tab-btn';
                if(btn.id === 'tab-' + tabName) {
                    btn.classList.add('active', contentData[tabName].color);
                } else {
                    var bKey = btn.id.replace('tab-','');
                    if(contentData[bKey]) btn.classList.add(contentData[bKey].color);
                }
            });
            renderContent();
        };

        function renderContent() {
            var data = contentData[currentTab];
            var contentArea = document.getElementById('content-area');
            var descArea = document.getElementById('desc-area');

            if (descArea && data) {
                if(data.description) {
                    descArea.innerHTML = data.description;
                    descArea.style.display = 'block';
                } else {
                    descArea.style.display = 'none';
                }
            }

            var tableRows = data.data.map(function(item, i) {
                return '<tr onclick="selectRow(this, ' + i + ')">' +
                    '<td class="topic-cell ' + data.type + '">' + item.topic + '</td>' +
                    '<td class="key-point-cell">' + item.fact + '</td>' +
                    '<td class="alert-cell">' + item.alert + '</td>' +
                '</tr>';
            }).join('');

            var secondCardHTML = `
                <div class="focus-card" style="border-color: var(--accent-gold);">
                    <div class="focus-card-header" style="background-color: var(--accent-gold); color: white;">
                        Study Card
                    </div>
                    <div class="focus-card-body">
                        <div>
                            <span class="focus-label">Topic</span>
                            <div class="focus-content" style="font-weight:800; font-size:1.3rem;">Klimek Topics</div>
                        </div>
                        <div>
                            <span class="focus-label">Key Fact</span>
                            <div class="focus-content" style="font-size:0.95rem;">
                                <ul style="margin: 0; padding-left: 1.2rem; line-height: 1.2;">
                                    <li>Lecture 1: Acid-Base & Vents</li>
                                    <li>Lecture 2: Alcoholism & Heavy Antibiotics</li>
                                    <li>Lecture 3: Cardiac, Tubes & CHD</li>
                                    <li>Lecture 4: Mobility & Psych</li>
                                    <li>Lecture 5: Diabetes & Endocrine</li>
                                    <li>Lecture 6: Tox & Electrolytes</li>
                                    <li>Lecture 7: Endo, Toys & Spine</li>
                                    <li>Lecture 8: Lab Values & Precautions</li>
                                    <li>Lecture 9: Psych Drugs</li>
                                    <li>Lecture 10: Maternity & Neonatology</li>
                                    <li>Lecture 11: Priorities & Delegation</li>
                                    <li>Lecture 12: Master Prioritization</li>
                                </ul>
                            </div>
                        </div>
                        <div class="focus-alert-box">
                            <span class="focus-label" style="color:#b91c1c;">⚠️ Clinical Alert</span>
                            <div class="focus-content" style="font-size:1rem;">You only need to score slightly below average to pass NCLEX.</div>
                        </div>
                    </div>
                </div>
            `;

            contentArea.innerHTML =
                '<div class="section-header-bar ' + data.color + '">' +
                    '<span>' + data.title + '</span>' +
                    '<div class="header-btns">' +
                        '<button class="header-btn" style="display:none;" id="mobile-card-btn" onclick="openCards(0)">📄 Cards</button>' +
                        '<button class="header-quiz-btn" onclick="startQuiz()">Take Quiz</button>' +
                    '</div>' +
                '</div>' +
                '<div class="grid-layout">' +
                    '<div>' +
                        '<div class="table-container">' +
                            '<table>' +
                                '<thead><tr><th>Topic</th><th>Clinical Fact</th><th>Nursing Priority / Alerts</th></tr></thead>' +
                                '<tbody id="table-body">' + tableRows + '</tbody>' +
                            '</table>' +
                        '</div>' +
                    '</div>' +
                    '<div style="display: flex; flex-direction: column; gap: 1.5rem;">' +
                        '<div class="visual-container" id="desktop-focus-card" style="background:none; border:none; padding-top:0;">' +
                            renderFocusCard(data.data[0], data) +
                        '</div>' +
                        '<div class="visual-container" id="static-focus-card" style="background:none; border:none; padding-top:0;">' +
                            secondCardHTML +
                        '</div>' +
                    '</div>' +
                '</div>';

            if (window.innerWidth <= 600) {
                document.getElementById('mobile-card-btn').style.display = 'inline-block';
                if (document.getElementById('desktop-focus-card')) document.getElementById('desktop-focus-card').style.display = 'none';
                if (document.getElementById('static-focus-card')) document.getElementById('static-focus-card').style.display = 'none';
            }
            
            // pre-select first row
            const firstRow = document.querySelector('#table-body tr');
            if(firstRow) firstRow.classList.add('selected');
        }
        
        function renderFocusCard(item, data) {
            if (!item || !data) return '';
            return `
                <div class="focus-card" style="border-color:${getComputedStyle(document.documentElement).getPropertyValue('--' + data.color.split('-')[1])};">
                    <div class="focus-card-header ${data.color}">
                        Study Card
                    </div>
                    <div class="focus-card-body">
                        <div>
                            <span class="focus-label">Topic</span>
                            <div class="focus-content" style="font-weight:800; font-size:1.3rem;">${item.topic}</div>
                        </div>
                        <div>
                            <span class="focus-label">Key Fact</span>
                            <div class="focus-content">${item.fact}</div>
                        </div>
                        <div class="focus-alert-box">
                            <span class="focus-label" style="color:#b91c1c;">⚠️ Clinical Alert</span>
                            <div class="focus-content" style="font-size:1rem;">${item.alert}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.selectRow = function(rowEl, index) {
            document.querySelectorAll('#table-body tr').forEach(function(r) { r.classList.remove('selected'); });
            rowEl.classList.add('selected');
            
            var data = contentData[currentTab];
            var item = data.data[index];

            if (window.innerWidth <= 600) {
                openCards(index);
            } else {
                document.getElementById('desktop-focus-card').innerHTML = renderFocusCard(item, data);
            }
        };

        // --- Quiz Logic ---
        window.startQuiz = function() {
            var data = contentData[currentTab];
            currentQuizData = data.data.slice(); // Copy array
            quizIndex = 0;
            quizScore = 0;
            showQuestion();
            document.getElementById('quiz-modal').style.display = 'flex';
        };

        function showQuestion() {
            var item = currentQuizData[quizIndex];
            var total = currentQuizData.length;
            document.getElementById('quiz-progress').textContent = 'Question ' + (quizIndex + 1) + ' of ' + total;
            document.getElementById('q-num-display').textContent = quizIndex + 1;
            document.getElementById('q-text').textContent = item.q;
            var fb = document.getElementById('feedback-area');
            fb.style.display = 'none';
            fb.classList.remove('is-visible');
            document.getElementById('next-btn').style.display = 'none';

            let answerObjects = item.a.map((ans, index) => ({ text: ans, originalIndex: index }));
            answerObjects = shuffleArray(answerObjects);

            var letters = ['A', 'B', 'C', 'D'];
            var optionsHTML = answerObjects.map(function(ansObj, i) {
                return '<div class="quiz-option" data-original-index="' + ansObj.originalIndex + '" onclick="checkAnswer(' + ansObj.originalIndex + ', this)">' +
                    '<div class="quiz-option-letter">' + letters[i] + '</div>' +
                    '<span style="flex-grow:1;">' + ansObj.text + '</span>' +
                    '<div class="correct-check" style="display:none; color:#10b981; font-weight:bold; font-size:1.2rem; margin-left:0.5rem;">✔</div>' +
                '</div>';
            }).join('');
            document.getElementById('q-options').innerHTML = optionsHTML;
        }

        window.checkAnswer = function(selectedOriginalIndex, btnElement) {
            var item = currentQuizData[quizIndex];
            var correct = item.correct;
            var options = document.querySelectorAll('.quiz-option');
            
            options.forEach(function(btn) {
                btn.style.pointerEvents = 'none';
            });

            var feedbackArea = document.getElementById('feedback-area');
            var feedbackHeader = document.getElementById('feedback-header');
            var rationaleText = document.getElementById('rationale-text');
            var nextBtn = document.getElementById('next-btn');

            if (rationaleText) rationaleText.innerHTML = item.rationale || "No rationale provided.";
            if (feedbackArea) feedbackArea.style.display = 'block';
            if (nextBtn) nextBtn.style.display = 'block';

            let isCorrect = (selectedOriginalIndex === correct);

            if (isCorrect) {
                quizScore++;
                btnElement.classList.add('correct-choice');
                btnElement.querySelector('.correct-check').style.display = 'block';
                if (feedbackHeader) {
                    feedbackHeader.className = 'feedback-header correct';
                    feedbackHeader.innerHTML = '✔ Correct!';
                }
                try { playSound('correct'); } catch(e){}
            } else {
                btnElement.classList.add('wrong-choice');
                const correctOption = Array.from(options).find(opt => parseInt(opt.dataset.originalIndex) === correct);
                if(correctOption) {
                    correctOption.classList.add('correct-choice');
                    correctOption.querySelector('.correct-check').style.display = 'block';
                }
                if (feedbackHeader) {
                    feedbackHeader.className = 'feedback-header incorrect';
                    feedbackHeader.innerHTML = '✖ Incorrect';
                }
                try { playSound('wrong'); } catch(e){}
            }

            if (quizIndex >= currentQuizData.length - 1) {
                nextBtn.textContent = 'Finish (' + quizScore + '/' + currentQuizData.length + ')';
            } else {
                nextBtn.textContent = 'Next Question';
            }

            setTimeout(function() {
                var quizBox = document.querySelector('.quiz-box');
                if (quizBox) {
                    quizBox.scrollTo({ top: quizBox.scrollHeight, behavior: 'smooth' });
                }
            }, 100);
        };

        window.nextQuestion = function() {
            quizIndex++;
            if (quizIndex < currentQuizData.length) {
                showQuestion();
                var overlay = document.querySelector('.quiz-box');
                overlay.scrollTop = 0;
            } else {
                var optionsContainer = document.getElementById('q-options');
                var qText = document.getElementById('q-text');
                if (qText) qText.innerText = "Quiz Complete!";
                if (optionsContainer) {
                    optionsContainer.innerHTML = `
                        <div style="text-align:center; padding:2rem; background: rgba(255,255,255,0.05); border-radius: 1rem;">
                            <h2 style="font-size: 2rem; margin-bottom: 1rem; color: white;">You scored ${quizScore} / ${currentQuizData.length}</h2>
                            <button class="action-btn" style="width:100%; max-width: 300px; background-color: var(--accent-gold); color: white; padding: 1rem; border: none; border-radius: 2rem; font-weight: bold; cursor: pointer; font-size: 1.1rem;" onclick="closeQuiz()">Return to Guide</button>
                        </div>
                    `;
                }
                document.getElementById('feedback-area').style.display = 'none';
                document.getElementById('next-btn').style.display = 'none';
                document.getElementById('q-num-display').style.display = 'none';
            }
        };

        window.closeQuiz = function() {
            document.getElementById('quiz-modal').style.display = 'none';
            document.getElementById('q-num-display').style.display = 'flex'; // reset for next time
        };

        window.addEventListener('resize', function() {
            if(document.getElementById('content-area').innerHTML !== "") {
                if (window.innerWidth <= 600) {
                    document.getElementById('mobile-card-btn').style.display = 'inline-block';
                    if (document.getElementById('desktop-focus-card')) document.getElementById('desktop-focus-card').style.display = 'none';
                    if (document.getElementById('static-focus-card')) document.getElementById('static-focus-card').style.display = 'none';
                } else {
                    document.getElementById('mobile-card-btn').style.display = 'none';
                    if (document.getElementById('desktop-focus-card')) document.getElementById('desktop-focus-card').style.display = 'block';
                    if (document.getElementById('static-focus-card')) document.getElementById('static-focus-card').style.display = 'block';
                }
            }
        });

        // Initial Render
        switchTab('gold');

    })();
    </script>
</div>

</body>
</html>
