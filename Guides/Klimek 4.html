<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📘 Klimek 4: Mobility & Psych</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; min-height: 100vh; min-height: 100dvh; background: #b8aad0; }
        html.dark, html.dark body { background: #0f172a; }
    </style>
</head>
<body>
<script>
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.classList.add('dark');
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(event) {
    if (event.matches) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }
});
</script>

<!-- Peptopia Klimek Guide Widget -->
<div id="peptopia-klimek-guide">
    <style>
        /* --- Scoped Styles --- */
        #peptopia-klimek-guide {
            --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
            --slate-700: #334155; --slate-800: #1e293b; --slate-900: #0f172a; --white: #ffffff;
            --rose-500: #fb7185; --blue-500: #06b6d4; --purple-500: #8b5cf6;
            --emerald-500: #10b981; --amber-500: #d97706; --pink-500: #ec4899; 
            --indigo-500: #6366f1; --orange-500: #f97316;
            
            /* Backgrounds (Pale versions for selection) */
            --rose-50: #fff1f2; --blue-50: #ecfeff; --purple-50: #f5f3ff;
            --emerald-50: #ecfdf5; --amber-50: #fffbeb; --pink-50: #fdf2f8; 
            --indigo-50: #eef2ff; --orange-50: #fff7ed;

            /* Alert Colors */
            --alert-bg: #fff7ed;
            --alert-border: #fdba74;
            --alert-text: #1e293b;
            
            /* UI Accents */
            --accent-gold: #f59e0b; 
            
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: transparent; color: var(--slate-900); line-height: 1.6;
            font-size: 16px; max-width: 76rem; margin: 0 auto; padding: 0.75rem;
            box-sizing: border-box; -webkit-text-size-adjust: 100%;
        }
        html.dark #peptopia-klimek-guide {
            --slate-50: #0f172a; --slate-100: #1e293b; --slate-200: #334155;
            --slate-700: #cbd5e1; --slate-800: #0f172a; --slate-900: #f1f5f9; --white: #1e293b;
            --rose-50: #1a0a0d; --blue-50: #0a1a1f; --purple-50: #0f0a1f;
            --emerald-50: #0a1a12; --amber-50: #1a150a; --pink-50: #1a0a14; 
            --indigo-50: #0a0e1f; --orange-50: #1a110a;
            --alert-bg: #1a150a; --alert-border: #92400e; --alert-text: #f1f5f9;
            background-color: transparent; color: #f1f5f9;
        }
        #peptopia-klimek-guide * { box-sizing: border-box; }
        
        #peptopia-klimek-guide .highlight-term {
            background-color: #fef08a; color: #000; padding: 0.1rem 0.4rem;
            border-radius: 0.25rem; font-weight: 800; display: inline-block; margin-bottom: 2px;
        }
        html.dark #peptopia-klimek-guide .highlight-term { background-color: #fde68a; color: #1e1b4b; }
        
        /* Navbar */
        #peptopia-klimek-guide .navbar {
            background: linear-gradient(135deg, #0a1628 0%, #0c2461 50%, #0a1628 100%);
            color: #fff; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 16px -2px rgba(10, 22, 40, 0.5), 0 0 20px rgba(30, 100, 255, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.25);
        }
        html.dark #peptopia-klimek-guide .navbar { background: linear-gradient(135deg, #020617 0%, #0c2461 50%, #020617 100%); border: 1px solid rgba(59, 130, 246, 0.3); }
        #peptopia-klimek-guide .nav-title { font-weight: 800; font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; text-align: center; }
        
        /* Tabs */
        #peptopia-klimek-guide .tabs-container {
            display: flex; flex-wrap: nowrap; gap: 0.5rem; margin-bottom: 0.5rem;
            overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 0.5rem; scrollbar-width: thin;
            justify-content: flex-start;
        }
        @media (min-width: 768px) { #peptopia-klimek-guide .tabs-container { justify-content: center; } }
        #peptopia-klimek-guide .tabs-container::-webkit-scrollbar { height: 4px; }
        #peptopia-klimek-guide .tabs-container::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        #peptopia-klimek-guide .tab-btn {
            padding: 0.6rem 1rem; border-radius: 0.5rem; font-weight: 700;
            border: none; cursor: pointer; transition: all 0.15s; font-size: 0.95rem;
            filter: grayscale(40%) opacity(0.9); text-align: center;
            white-space: nowrap; flex-shrink: 0; color: #fff;
        }
        #peptopia-klimek-guide .tab-btn:hover { filter: grayscale(0%) opacity(1); transform: translateY(-1px); }
        #peptopia-klimek-guide .tab-btn.active {
            filter: grayscale(0%) opacity(1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 0 0 2px rgba(255,255,255,0.3);
            transform: translateY(1px);
        }

        /* Tab Colors */
        #peptopia-klimek-guide #tab-crutches { background-color: var(--rose-500); }
        #peptopia-klimek-guide #tab-canes_walk { background-color: var(--blue-500); }
        #peptopia-klimek-guide #tab-psych_basics { background-color: var(--purple-500); }
        #peptopia-klimek-guide #tab-psych_types { background-color: var(--emerald-500); }
        #peptopia-klimek-guide #tab-psych_tx { background-color: var(--amber-500); }
        #peptopia-klimek-guide #tab-psych_speech { background-color: var(--indigo-500); }
        #peptopia-klimek-guide #tab-defense_mech { background-color: var(--pink-500); }
        #peptopia-klimek-guide #tab-violent_client { background-color: var(--orange-500); }

        /* Section Header Bar */
        #peptopia-klimek-guide .section-header-bar {
            padding: 0.35rem 1.5rem; color: white;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 0.5rem; font-size: 1.25rem; font-weight: 800;
            margin-bottom: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); gap: 0.5rem;
        }
        @media (max-width: 600px) {
            #peptopia-klimek-guide .section-header-bar { font-size: 1.1rem; padding: 0.35rem 1rem; flex-wrap: wrap; }
        }
        
        #peptopia-klimek-guide .header-btn {
            background-color: #312e81; color: white; border: 2px solid rgba(255,255,255,0.5);
            padding: 0.3rem 1rem; border-radius: 0.4rem; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s; white-space: nowrap; -webkit-tap-highlight-color: transparent;
        }
        #peptopia-klimek-guide .header-btn:hover { background-color: white; color: #312e81; transform: scale(1.02); }
        
        #peptopia-klimek-guide .header-quiz-btn {
            background-color: #312e81; color: white; border: 2px solid rgba(255,255,255,0.5);
            padding: 0.3rem 1rem; border-radius: 0.4rem;
            font-size: 0.9rem; font-weight: 700; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        #peptopia-klimek-guide .header-quiz-btn:hover {
            background-color: white; color: #312e81; transform: scale(1.02);
        }
        
        #peptopia-klimek-guide .header-btns { display: flex; gap: 0.5rem; flex-shrink: 0; }

        /* Card Overlay & Modal */
        #peptopia-klimek-guide .card-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.92); z-index: 1999;
            align-items: flex-start; justify-content: center; padding: 0;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        #peptopia-klimek-guide .card-modal {
            background: var(--white); width: 100%; max-width: 560px; border-radius: 0;
            min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column;
        }
        @media (min-width: 640px) {
            #peptopia-klimek-guide .card-overlay { align-items: center; padding: 1.5rem; }
            #peptopia-klimek-guide .card-modal { border-radius: 1rem; min-height: auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        }
        html.dark #peptopia-klimek-guide .card-modal { background: #1e293b; }
        #peptopia-klimek-guide .card-modal-header {
            padding: 0.75rem 1rem; color: white; font-weight: 800; font-size: 1rem;
            display: flex; justify-content: space-between; align-items: center; border-radius: 0;
        }
        @media (min-width: 640px) { #peptopia-klimek-guide .card-modal-header { border-radius: 1rem 1rem 0 0; } }
        #peptopia-klimek-guide .card-modal-header .card-close-btn {
            background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 0 0.25rem; line-height: 1;
        }
        #peptopia-klimek-guide .card-modal-body { padding: 1.25rem; flex-grow: 1; }
        #peptopia-klimek-guide .card-modal-body .card-topic { font-size: 1.35rem; font-weight: 800; margin-bottom: 1rem; color: var(--slate-900); }
        html.dark #peptopia-klimek-guide .card-modal-body .card-topic { color: #f1f5f9; }
        #peptopia-klimek-guide .card-modal-body .card-section { margin-bottom: 1rem; }
        #peptopia-klimek-guide .card-modal-body .card-label {
            font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px;
            color: #64748b; font-weight: 800; margin-bottom: 0.3rem; display: block;
        }
        html.dark #peptopia-klimek-guide .card-modal-body .card-label { color: #94a3b8; }
        #peptopia-klimek-guide .card-modal-body .card-fact { font-size: 1.05rem; line-height: 1.5; color: var(--slate-900); }
        html.dark #peptopia-klimek-guide .card-modal-body .card-fact { color: #e2e8f0; }
        #peptopia-klimek-guide .card-modal-body .card-alert-box {
            background: #fff1f2; border-left: 5px solid #e11d48; padding: 0.75rem; border-radius: 0.25rem;
        }
        html.dark #peptopia-klimek-guide .card-modal-body .card-alert-box { background: #1c1012; border-left-color: #be123c; }
        #peptopia-klimek-guide .card-modal-body .card-alert-box .card-fact { font-size: 0.95rem; }
        #peptopia-klimek-guide .card-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem 1rem; border-top: 1px solid var(--slate-200); gap: 0.5rem;
        }
        html.dark #peptopia-klimek-guide .card-nav { border-top-color: #334155; }
        #peptopia-klimek-guide .card-nav-btn {
            background: #4f46e5; color: white; border: none; padding: 0.55rem 1.25rem;
            border-radius: 2rem; font-weight: 700; cursor: pointer; font-size: 0.9rem;
            transition: background 0.15s; -webkit-tap-highlight-color: transparent;
        }
        #peptopia-klimek-guide .card-nav-btn:hover { background: #4338ca; }
        #peptopia-klimek-guide .card-nav-btn:disabled { opacity: 0.35; cursor: default; }
        #peptopia-klimek-guide .card-counter { font-size: 0.85rem; font-weight: 700; color: #64748b; white-space: nowrap; }
        html.dark #peptopia-klimek-guide .card-counter { color: #94a3b8; }

        /* Main Grid */
        #peptopia-klimek-guide .grid-layout { display: flex; flex-direction: column; gap: 1.5rem; align-items: flex-start; } 
        @media (min-width: 850px) {
            #peptopia-klimek-guide .grid-layout { flex-direction: row; }
            #peptopia-klimek-guide .grid-layout > div:first-child { flex: 2; width: 100%; } /* Left Col */
            #peptopia-klimek-guide .grid-layout > div:last-child { flex: 1; width: 100%; position: sticky; top: 1rem; }  /* Right Col */
        }

        /* Description Box */
        #peptopia-klimek-guide .description-box {
            padding: 1rem; background: #ffffff; 
            border: 2px solid #e2e8f0; border-radius: 0.5rem;
            border-left: 6px solid var(--slate-700);
            font-size: 1.05rem; color: #000000; font-weight: 500;
            margin-bottom: 1.5rem;
        }

        /* Data Table */
        #peptopia-klimek-guide .table-container { 
            overflow-x: auto; -webkit-overflow-scrolling: touch; 
            border: 2px solid #334155; border-radius: 0.75rem; 
            background: white; max-height: 600px; overflow-y: auto; 
        }
        html.dark #peptopia-klimek-guide .table-container { background: #1e293b; border-color: #475569; }
        #peptopia-klimek-guide table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        #peptopia-klimek-guide th { 
            padding: 0.75rem; background-color: #f1f5f9; color: #0f172a; 
            border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 5; 
            font-weight: 800; font-size: 0.9rem;
        }
        html.dark #peptopia-klimek-guide th { background-color: #334155; color: #f1f5f9; border-bottom-color: #475569; }
        #peptopia-klimek-guide td { padding: 0.75rem; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
        html.dark #peptopia-klimek-guide td { border-bottom-color: #334155; color: #e2e8f0; }
        #peptopia-klimek-guide tr:hover td { cursor: pointer; background-color: #f8fafc; filter: brightness(98%); }
        html.dark #peptopia-klimek-guide tr:hover td { background-color: #1e293b; }
        #peptopia-klimek-guide tr.selected td { border-left: 5px solid var(--accent-gold); background-color: #fffbeb; }
        html.dark #peptopia-klimek-guide tr.selected td { background-color: #1c1917; }

        /* Cell Specifics */
        #peptopia-klimek-guide .topic-cell { font-weight: 800; width: 1%; white-space: nowrap; color: #000; vertical-align: top; }
        html.dark #peptopia-klimek-guide .topic-cell { color: #f1f5f9; }
        #peptopia-klimek-guide .topic-cell.crutches { background-color: var(--rose-50); }
        #peptopia-klimek-guide .topic-cell.canes_walk { background-color: var(--blue-50); }
        #peptopia-klimek-guide .topic-cell.psych_basics { background-color: var(--purple-50); }
        #peptopia-klimek-guide .topic-cell.psych_types { background-color: var(--emerald-50); }
        #peptopia-klimek-guide .topic-cell.psych_tx { background-color: var(--amber-50); }
        #peptopia-klimek-guide .topic-cell.psych_speech { background-color: var(--indigo-50); }
        #peptopia-klimek-guide .topic-cell.defense_mech { background-color: var(--pink-50); }
        #peptopia-klimek-guide .topic-cell.violent_client { background-color: var(--orange-50); }

        #peptopia-klimek-guide .key-point-cell { color: #334155; font-style: normal; font-weight: 500; }
        html.dark #peptopia-klimek-guide .key-point-cell { color: #cbd5e1; }
        #peptopia-klimek-guide .alert-cell { color: #991b1b; background-color: #fef2f2; border-left: 3px solid #f87171; font-weight: 600; }
        html.dark #peptopia-klimek-guide .alert-cell { background-color: #1c1012; color: #fca5a5; border-left-color: #dc2626; }

        @media (max-width: 600px) {
            #peptopia-klimek-guide .table-container { max-height: none; }
            #peptopia-klimek-guide table, #peptopia-klimek-guide thead, #peptopia-klimek-guide tbody,
            #peptopia-klimek-guide th, #peptopia-klimek-guide td, #peptopia-klimek-guide tr { display: block; width: 100%; }
            #peptopia-klimek-guide thead { display: none; }
            #peptopia-klimek-guide tr { border-bottom: 2px solid #e2e8f0; padding: 0.6rem 0; margin-bottom: 0.35rem; }
            html.dark #peptopia-klimek-guide tr { border-bottom-color: #334155; }
            #peptopia-klimek-guide td { padding: 0.3rem 0.65rem; border-bottom: none; position: relative; padding-left: 0.65rem; }
            #peptopia-klimek-guide .topic-cell { font-size: 1.05rem; padding-bottom: 0.15rem; white-space: normal; }
            #peptopia-klimek-guide .key-point-cell::before { content: '📌 '; }
            #peptopia-klimek-guide .alert-cell {
                border-left: 3px solid #f87171; margin: 0.2rem 0.3rem;
                border-radius: 0.25rem; padding: 0.4rem 0.6rem; font-size: 0.85rem;
            }
            #peptopia-klimek-guide tr.selected td { border-left: none; }
            #peptopia-klimek-guide tr.selected { border-left: 4px solid var(--accent-gold); background: #fffbeb; border-radius: 0.5rem; }
            html.dark #peptopia-klimek-guide tr.selected { background: #1c1917; }
        }

        /* Focus Card */
        #peptopia-klimek-guide .focus-card {
            background-color: white; border: 2px solid; 
            border-radius: 0.75rem; min-height: 250px;
            display: flex; flex-direction: column; 
            padding: 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        html.dark #peptopia-klimek-guide .focus-card { background: #1e293b; }
        #peptopia-klimek-guide .focus-card-header {
            padding: 0.75rem 1rem; border-radius: 0.55rem 0.55rem 0 0; color: white; font-weight: 800; font-size: 1.1rem; text-align: center;
        }
        #peptopia-klimek-guide .focus-card-body { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; gap: 1.5rem; }
        #peptopia-klimek-guide .focus-label {
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #64748b; font-weight: 800; margin-bottom: 0.25rem; display: block;
        }
        html.dark #peptopia-klimek-guide .focus-label { color: #94a3b8; }
        #peptopia-klimek-guide .focus-content { font-size: 1.15rem; color: #000; line-height: 1.4; }
        html.dark #peptopia-klimek-guide .focus-content { color: #f1f5f9; }
        #peptopia-klimek-guide .focus-alert-box {
            background-color: #fff1f2; border-left: 5px solid #e11d48; padding: 1rem; border-radius: 0.25rem;
        }
        html.dark #peptopia-klimek-guide .focus-alert-box { background: #1c1012; border-left-color: #be123c; }

        /* --- UPDATED QUIZ STYLES --- */
        #peptopia-klimek-guide .quiz-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.96); z-index: 2000; 
            align-items: flex-start; justify-content: center; padding: 0;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        #peptopia-klimek-guide .quiz-box {
            background: #171527; 
            width: 100%; max-width: 800px; padding: 2rem; border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 1px solid #4338ca;
            color: white; display: flex; flex-direction: column;
            max-height: 90vh; overflow-y: auto;
            scroll-behavior: smooth;
        }
        #peptopia-klimek-guide .quiz-question-number {
            background: #6366f1; 
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; margin-right: 1rem; flex-shrink: 0; font-size: 1.1rem; color: white;
        }
        #peptopia-klimek-guide .quiz-header-row { display: flex; align-items: flex-start; margin-bottom: 1.5rem; }
        #peptopia-klimek-guide .quiz-question-text { font-size: 1.15rem; line-height: 1.5; font-weight: 500; color: white; margin-top: 0.3rem;}
        
        #peptopia-klimek-guide .quiz-option {
            background: #1e1b4b; 
            border: 1px solid rgba(255,255,255,0.05); 
            padding: 0.65rem 1rem; 
            margin-bottom: 0.5rem; 
            border-radius: 0.5rem; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: flex-start; 
            font-size: 0.95rem; color: #e2e8f0;

        #peptopia-klimek-guide .quiz-option:hover { background: #2e2a5d; border-color: #6366f1; }

            #peptopia-klimek-guide .quiz-option:hover { background: #1e1b4b; border-color: rgba(255,255,255,0.05); }
            #peptopia-klimek-guide .quiz-option:active { background: #2e2a5d; border-color: #6366f1; }

        #peptopia-klimek-guide .quiz-option.correct-choice { border-color: #10b981; background: rgba(16, 185, 129, 0.1); color: white; }
        #peptopia-klimek-guide .quiz-option.wrong-choice { border-color: #ef4444; opacity: 0.6; }
        
        #peptopia-klimek-guide .quiz-option-letter {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-right: 1rem; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; color: white;
            margin-top: 0.1rem; 
        }
        #peptopia-klimek-guide .quiz-option-letter.A { background: #ec4899; } 
        #peptopia-klimek-guide .quiz-option-letter.B { background: #3b82f6; } 
        #peptopia-klimek-guide .quiz-option-letter.C { background: #10b981; } 
        #peptopia-klimek-guide .quiz-option-letter.D { background: #eab308; color: #000; } 

        #peptopia-klimek-guide .feedback-container {
            margin-top: 1.5rem; background: #171527; border-radius: 0.5rem; 
            border: 1px solid #4338ca; overflow: hidden; display: none; padding: 1rem;
        }
        #peptopia-klimek-guide .feedback-header {
            display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap;
        }
        #peptopia-klimek-guide .feedback-badge {

    <script>
    (function() {
        // --- DATA FOR KLIMEK 4 ---
        const contentData = {
            crutches: {
                title: 'Crutches & Gaits',
                color: 'bg-rose',
                type: 'crutches',
                data: [
                    { topic: 'Crutch Fit', fact: '<span class="highlight-term">2-3 fingers</span> width below the anterior axillary fold.', alert: 'Nerve damage risk: Never let crutch pads touch the armpit.', q: 'How many finger widths should be between the axilla and the crutch pad?', a: ['2-3 fingers', '4-5 fingers', '0 fingers (flush)', '1 hand width'], correct: 0, rationale: 'Proper crutch fit requires a gap of 2-3 fingers below the axilla to prevent pressure on the brachial plexus nerve, which causes axillary crutch paralysis.' },
                    { topic: 'Crutch Handgrip', fact: 'Weight should be on the hands, not armpits.', alert: 'Elbow flexion should be approximately <span class="highlight-term">30 degrees</span>.', q: 'When a patient is properly using crutches, the elbow flexion should be:', a: ['30 degrees', '45 degrees', '15 degrees', 'Fully straight'], correct: 0, rationale: 'The handgrips should be adjusted so the elbow is flexed at about 30 degrees, allowing the arms to bear the body weight.' },
                    { topic: '2-Point Gait', fact: '<span class="highlight-term">Move</span> = 1 Crutch + opposite foot together.', alert: 'Use for mild bilateral weakness. Always move opposite sides together.', q: 'Which statement correctly describes the 2-point crutch gait?', a: ['Move one crutch and the opposite foot simultaneously', 'Move both crutches forward, then both feet', 'Move one crutch, then the opposite foot independently', 'Move both crutches and the bad leg together'], correct: 0, rationale: 'In 2-point gait, you move the right crutch and left foot together, then the left crutch and right foot together. It mimics natural arm swing during walking.' },
                    { topic: '3-Point Gait', fact: '<span class="highlight-term">Move</span> = 2 crutches + bad leg together.', alert: 'Use when one leg is non-weight bearing (e.g., cast, fracture).', q: 'A patient has a casted left leg and is non-weight bearing. Which crutch gait should they use?', a: ['3-point gait', '2-point gait', '4-point gait', 'Swing-through gait'], correct: 0, rationale: 'The 3-point gait is used for unilateral weakness or non-weight bearing. Both crutches and the bad leg move forward together, followed by the good leg.' },
                    { topic: '4-Point Gait', fact: 'Move: Crutch, Foot, Crutch, Foot.', alert: 'Very slow. Use for severe bilateral weakness (e.g., polio, severe arthritis).', q: 'Which crutch gait provides the maximum stability with 3 points of contact on the ground at all times?', a: ['4-point gait', '2-point gait', '3-point gait', 'Swing-to gait'], correct: 0, rationale: 'The 4-point gait is the slowest but most stable. The patient moves one crutch, then opposite foot, then other crutch, then opposite foot.' },
                    { topic: 'Swing-Through', fact: 'Plant both crutches, swing both legs past crutches.', alert: 'Used for non-weight bearing bilateral issues (e.g., paraplegics, amputees).', q: 'Which gait is most commonly taught to patients with bilateral leg braces or paraplegia?', a: ['Swing-through gait', '4-point gait', '2-point gait', '3-point gait'], correct: 0, rationale: 'Patients with no leg function use the swing-through gait by planting the crutches and using upper body momentum to swing their legs past the crutches.' },
                    { topic: 'Stairs: Up and Down', fact: '<span class="highlight-term">Up</span> with the Good, <span class="highlight-term">Down</span> with the Bad.', alert: 'Crutches always move with the BAD leg.', q: 'A patient on crutches is approaching a staircase to go UP. Which moves first?', a: ['The good leg steps up first', 'The bad leg steps up first', 'The crutches go up first', 'Both legs hop up simultaneously'], correct: 0, rationale: 'When going UP stairs, the patient leads with the strong (good) leg to power the lift. The crutches and the bad leg follow.' },
                    { topic: 'Stairs: Going Down', fact: 'Lead with the <span class="highlight-term">BAD</span> leg.', alert: 'Gravity helps the bad leg go down. Good leg stays up to stabilize.', q: 'When a patient on crutches goes DOWN the stairs, what is the correct sequence?', a: ['Move the crutches and bad leg down first, then the good leg', 'Move the good leg down first, then the crutches', 'Hop down with both legs', 'Leave crutches behind and slide down'], correct: 0, rationale: '"Down with the Bad." The crutches and the affected leg step down to the next tread first, while the strong leg holds the body\'s weight.' }
                ]
            },
            canes_walk: {
                title: 'Canes & Walkers',
                color: 'bg-blue',
                type: 'canes_walk',
                data: [
                    { topic: 'Cane Side', fact: 'Hold the cane on the <span class="highlight-term">STRONG</span> (unaffected) side.', alert: 'Mnemonic: COAL (Cane Opposite Affected Leg).', q: 'A patient had left knee surgery. In which hand should they hold their cane?', a: ['Right hand (strong side)', 'Left hand (weak side)', 'Whichever feels comfortable', 'Alternating hands'], correct: 0, rationale: 'The cane should be held on the strong (unaffected) side to widen the base of support and reduce load on the weak side.' },
                    { topic: 'Cane Advancement', fact: 'Advance the cane SIMULTANEOUSLY with the <span class="highlight-term">WEAK</span> leg.', alert: 'The cane supports the bad leg as it moves.', q: 'When walking with a cane, how should the patient step?', a: ['Move the cane and the weak leg forward together', 'Move the cane and the strong leg forward together', 'Move the strong leg first, then the cane', 'Move both legs, then reach the cane forward'], correct: 0, rationale: 'The cane acts as a substitute for the weak leg. They must move forward together to provide continuous support.' },
                    { topic: 'Walker Sequence', fact: 'Pick it up, set it down, walk to it.', alert: 'Do NOT slide the walker unless it has wheels.', q: 'What is the correct sequence for using a standard (non-wheeled) walker?', a: ['Pick it up, set it down, walk into it', 'Push it forward along the floor while walking', 'Walk first, then drag the walker forward', 'Lean heavily on it and shuffle feet'], correct: 0, rationale: 'A standard walker must be lifted and placed securely on all four legs before the patient steps into the frame.' },
                    { topic: 'Walker Belongings', fact: 'Tie belongings to the <span class="highlight-term">SIDES</span> of the walker.', alert: 'Never tie to the front (tips the walker forward).', q: 'Where is the safest place for a patient to attach a small bag to their walker?', a: ['On the side bars', 'On the front crossbar', 'On the hand grips', 'On the bottom legs'], correct: 0, rationale: 'Tying weight to the front crossbar shifts the center of gravity, making the walker prone to tipping forward and causing a fall.' },
                    { topic: 'Chair to Walker', fact: 'To stand up, push off the <span class="highlight-term">CHAIR armrests</span>.', alert: 'NEVER pull on the walker to stand up.', q: 'A patient is sitting in a chair and needs to use their walker. What instruction must the nurse give?', a: ['"Push up from the chair armrests to stand."', '"Grab the walker handles and pull yourself up."', '"Rock back and forth until you have momentum."', '"Have someone lift you by the arms."'], correct: 0, rationale: 'Pulling on a walker to stand will cause it to tip over onto the patient. They must always push off a stable surface (the chair).' },
                    { topic: 'Walker Modifications', fact: 'Tennis balls and wheels are controversial.', alert: 'NCLEX rule: Standard walker = no wheels, pick up to move.', q: 'For NCLEX testing purposes, how should a standard walker be moved?', a: ['Lifted and placed down', 'Slid along the floor with tennis balls', 'Rolled on front wheels', 'Pushed aggressively'], correct: 0, rationale: 'Unless specified as a "rolling walker," standard walkers must be picked up and set down to ensure 4-point stability.' }
                ]
            },
            psych_basics: {
                title: 'Psychosis Basics',
                color: 'bg-purple',
                type: 'psych_basics',
                data: [
                    { topic: 'Non-Psychotic', fact: 'Patient has <span class="highlight-term">INSIGHT</span> and is reality-based.', alert: 'They know what is wrong with them. Treat them like a normal Med-Surg patient.', q: 'A patient with severe depression says, "I feel overwhelmed by sadness and I know I need help." How should the nurse classify this patient?', a: ['Non-psychotic (has insight)', 'Psychotic (delusional)', 'Demented', 'Delirious'], correct: 0, rationale: 'Non-psychotic patients are in touch with reality and have insight into their illness. Good therapeutic communication applies.' },
                    { topic: 'Psychotic', fact: 'Patient has <span class="highlight-term">NO INSIGHT</span> and is not reality-based.', alert: 'They do not think they are sick. They blame others/environment.', q: 'Which statement best defines a psychotic patient according to Klimek?', a: ['They have no insight and are not reality-based', 'They are always violent', 'They have organic brain damage', 'They suffer from minor anxiety'], correct: 0, rationale: 'A true psychotic patient lacks insight (they don\'t know they are sick) and their perception of reality is fundamentally altered.' },
                    { topic: 'Delusion', fact: 'A false, fixed <span class="highlight-term">BELIEF</span> or idea. No sensory component.', alert: 'Paranoid (People out to get me), Grandiose (I am God), Somatic (My arm is a laser).', q: 'A patient states, "I am the President of the Universe." What is this called?', a: ['A grandiose delusion', 'An auditory hallucination', 'A somatic illusion', 'A paranoid hallucination'], correct: 0, rationale: 'A delusion is a thought or belief. Grandiose delusions involve false beliefs of immense power, wealth, or identity.' },
                    { topic: 'Hallucination', fact: 'A false <span class="highlight-term">SENSORY</span> perception. Hearing, seeing, feeling things not there.', alert: 'Auditory (most common), Visual, Tactile, Olfactory, Gustatory.', q: 'A patient says, "I hear the devil telling me to break the window." What is this?', a: ['An auditory hallucination', 'A visual illusion', 'A paranoid delusion', 'A somatic delusion'], correct: 0, rationale: 'Hallucinations involve the senses. Hearing voices when no one is speaking is an auditory hallucination.' },
                    { topic: 'Illusion', fact: 'Misinterpretation of a <span class="highlight-term">REAL</span> sensory experience.', alert: 'With an illusion, there is an actual referent in reality. (e.g., sees a cord, thinks it\'s a snake).', q: 'A patient looks at a fire extinguisher cord on the wall and screams, "There is a snake!" What is this?', a: ['An illusion', 'A visual hallucination', 'A somatic delusion', 'A paranoid delusion'], correct: 0, rationale: 'Because there is a real object (the cord) that the patient is misinterpreting, it is an illusion. If they saw a snake on an empty wall, it would be a hallucination.' },
                    { topic: 'Illusion vs Hallucination', fact: 'Illusion = Real object exists. Hallucination = Nothing is there.', alert: 'Key distinction for NCLEX psych questions.', q: 'The nurse asks, "Do you hear those people talking?" The patient points to a blank wall and says, "Yes." What is occurring?', a: ['A hallucination', 'An illusion', 'A delusion', 'A confabulation'], correct: 0, rationale: 'Because there is nothing actually there producing sound or an image, it is a hallucination. There is no referent in reality.' }
                ]
            },
            psych_types: {
                title: 'Types of Psychosis',
                color: 'bg-emerald',
                type: 'psych_types',
                data: [
                    { topic: 'Functional Psychosis', fact: 'Chemical imbalance. Brain is physically intact.', alert: 'Schizophrenia, Schizoaffective, Major Depression, Mania. They CAN learn reality.', q: 'Which of the following conditions is considered a Functional Psychosis?', a: ['Schizophrenia', 'Alzheimer\'s Disease', 'Wernicke-Korsakoff Syndrome', 'Post-op Delirium'], correct: 0, rationale: 'Functional psychoses (Schizophrenia, Schizoaffective, Major Depression, Mania) mean the brain functions chemically abnormally, but has no structural damage.' },
                    { topic: 'Psychosis of Dementia', fact: 'Actual <span class="highlight-term">brain damage</span>. Cannot learn reality.', alert: 'Alzheimer\'s, Senile, Wernicke\'s, Organic Brain Syndrome.', q: 'A patient with late-stage Alzheimer\'s disease is experiencing psychosis. How is this classified?', a: ['Psychosis of Dementia', 'Functional Psychosis', 'Acute Delirium', 'Schizoaffective Disorder'], correct: 0, rationale: 'Dementia involves physical, structural brain damage. The brain has lost the capacity to learn new information or reality.' },
                    { topic: 'Psychotic Delirium', fact: 'Sudden, temporary, episodic secondary loss of reality.', alert: 'Due to chemical imbalance in body (UTI, Thyroid Storm, Drugs).', q: 'A 70-year-old patient 2 days post-op for a hip replacement suddenly sees bugs on the wall. This is likely:', a: ['Psychotic Delirium', 'Functional Schizophrenia', 'Dementia of Alzheimer\'s type', 'A somatic delusion'], correct: 0, rationale: 'Delirium is a temporary, acute state of confusion/psychosis secondary to an underlying physical issue (surgery, infection, drugs).' },
                    { topic: 'Functional vs Dementia', fact: 'Functional = Can learn reality. Dementia = Cannot learn reality.', alert: 'This defines how you therapeutically intervene.', q: 'What is the primary difference in cognitive capacity between a patient with Schizophrenia and a patient with Alzheimer\'s?', a: ['The Schizophrenic patient has the potential to learn reality; the Alzheimer\'s patient does not', 'The Alzheimer\'s patient can learn reality; the Schizophrenic cannot', 'There is no difference in their cognitive capacity', 'Schizophrenics only have delusions, Alzheimer\'s only have hallucinations'], correct: 0, rationale: 'Because a functional psychotic (Schizophrenic) has an intact brain structure, you must teach them reality. The demented patient has structural damage and cannot learn it.' },
                    { topic: 'Major Depression', fact: 'Only psychotic if it is <span class="highlight-term">Major</span> Depression.', alert: 'Mild/Moderate depression is non-psychotic (has insight).', q: 'When dealing with depressed patients, which diagnosis indicates potential psychosis?', a: ['Major Depressive Disorder', 'Mild Situational Depression', 'Adjustment Disorder', 'Premenstrual Dysphoric Disorder'], correct: 0, rationale: 'Only the most severe "Major" depression crosses the threshold into functional psychosis where reality is lost.' },
                    { topic: 'Mania', fact: 'The manic phase of Bipolar disorder is a functional psychosis.', alert: 'Patient is hyper-elevated and loses touch with reality.', q: 'During an acute manic episode, a patient believes they can fly. What type of psychosis is this?', a: ['Functional Psychosis', 'Psychosis of Dementia', 'Delirium Tremens', 'Non-psychotic delusion'], correct: 0, rationale: 'Mania is one of the four main Functional Psychoses (Schizo, Schizoaffective, Major Depression, Mania). The brain is physically intact.' }
                ]
            },
            psych_tx: {
                title: 'Psych Interventions',
                color: 'bg-amber',
                type: 'psych_tx',
                data: [
                    { topic: 'Treating Functional', fact: '1. Acknowledge feeling. 2. <span class="highlight-term">Present Reality</span>. 3. Set limit. 4. Enforce.', alert: 'Because their brain is intact, you MUST teach them reality.', q: 'A Schizophrenic patient says, "The CIA is listening through the TV." What is the best response?', a: ['"That must be scary, but there are no listening devices in the TV. We are safe here in the hospital."', '"Let\'s go watch another TV in the day room."', '"Yes, I see the microphone right there."', '"Why do you think the CIA cares about you?"'], correct: 0, rationale: 'For a functional psychotic, acknowledge the feeling ("That must be scary"), then present reality ("there are no devices... we are in a hospital").' },
                    { topic: 'Treating Dementia', fact: '1. Acknowledge feeling. 2. <span class="highlight-term">REDIRECT</span>.', alert: 'Never present reality to dementia patients (they can\'t learn it). Do not argue.', q: 'A patient with Alzheimer\'s is packing her bags to "go to work." She retired 20 years ago. Best response?', a: ['"It sounds like you had a busy career. Tell me about your job while we go to the dining room."', '"You retired 20 years ago, remember?"', '"I will take your bags so you can rest."', '"Sit back down, you are not leaving."'], correct: 0, rationale: 'For dementia, acknowledge the feeling/theme ("busy career") and redirect them to a safe, current activity ("go to dining room"). Never force reality.' },
                    { topic: 'Dementia Reality Exception', fact: 'Do not present reality regarding their delusion, BUT...', alert: 'You CAN orient them to Person, Place, and Time.', q: 'Is it appropriate to orient an Alzheimer\'s patient to the current year?', a: ['Yes, reality orientation to person, place, and time is always appropriate', 'No, never present any reality to dementia patients', 'Only if they ask what year it is', 'Only during their lucid moments'], correct: 0, rationale: 'While you do not present reality to challenge their delusions (e.g., "your husband is dead"), you absolutely DO reality-orient them to basic Person, Place, and Time.' },
                    { topic: 'Treating Delirium', fact: '1. Acknowledge feeling. 2. <span class="highlight-term">REASSURE</span> them of safety & temporariness.', alert: 'Don\'t present reality (they won\'t get it). Reassure it will go away.', q: 'A patient with a UTI and high fever is hallucinating spiders. What is the best response?', a: ['"You look frightened. You are safe here, and this feeling will go away as your infection clears."', '"Those aren\'t spiders, they are just shadows."', '"Let\'s go for a walk to get away from the spiders."', '"I will squash the spiders for you."'], correct: 0, rationale: 'Delirium is temporary. The intervention is to acknowledge feeling, reassure them they are safe, and reassure them that the symptom will fade as they get better.' },
                    { topic: 'Setting Limits', fact: 'Used for Functional Psychotics.', alert: 'Tell them what they CAN do, not what they can\'t.', q: 'When setting a limit with a manic patient, which phrasing is best?', a: ['"We are not going to talk about the CIA. We can talk about your lunch or your art project."', '"Stop talking about the CIA immediately."', '"Why do you keep bringing up the CIA?"', '"If you talk about the CIA, you go to your room."'], correct: 0, rationale: 'Setting limits effectively means stating the boundary clearly and giving them acceptable alternatives, rather than just being punitive.' },
                    { topic: 'Enforcing Limits', fact: 'If a functional patient breaks a limit, enforce it by <span class="highlight-term">ending the conversation</span>.', alert: 'Do not punish; just withdraw attention.', q: 'A Schizoaffective patient continues to talk about alien abductions after you set a limit. What do you do?', a: ['"I see you are not ready to change the subject. I will come back in 15 minutes."', '"I told you to stop. Now you lose TV privileges."', '"I guess we can talk about it for 5 more minutes."', 'Ignore them and stare blankly.'], correct: 0, rationale: 'Enforcing the limit means ending the interaction professionally and objectively, removing the positive reinforcement (your attention) until they can comply with reality-based conversation.' }
                ]
            },
            psych_speech: {
                title: 'Psychotic Speech & Behaviors',
                color: 'bg-indigo',
                type: 'psych_speech',
                description: 'Klimek 4: Classic speech patterns and behavioral rules in psychosis.',
                data: [
                    { topic: 'Flight of Ideas', fact: 'Stringing phrases together but changing topics rapidly.', alert: 'Phrases are coherent individually, but the connection is loose.', q: 'A patient rapidly changes from talking about their breakfast to the weather to a childhood memory. What is this?', a: ['Flight of ideas', 'Word salad', 'Neologism', 'Echolalia'], correct: 0, rationale: 'Flight of ideas occurs when a patient rapidly jumps from one coherent thought/phrase to another.' },
                    { topic: 'Word Salad', fact: 'Random words thrown together without any logical connection.', alert: 'The patient is babbling a jumble of words.', q: 'A patient says, "Table, blue, running, sky, quickly." How should the nurse document this?', a: ['Word salad', 'Flight of ideas', 'Neologism', 'Ideas of reference'], correct: 0, rationale: 'Word salad is a severe loosening of associations where the individual words have no logical connection to each other.' },
                    { topic: 'Neologisms', fact: 'Making up fake words that only have meaning to the patient.', alert: 'Do not pretend to understand what the word means.', q: 'A patient tells you they need to find their "sploogle" before they can eat. What is this speech pattern called?', a: ['Neologism', 'Word salad', 'Flight of ideas', 'Illusion'], correct: 0, rationale: 'A neologism is a newly coined word or expression created by the patient.' },
                    { topic: 'Narrowed Self-Concept', fact: 'When a functional psychotic refuses to leave their room or change their clothes.', alert: 'They define who they are by where they are and what they wear. Do NOT force them.', q: 'A schizophrenic patient refuses to change out of soiled clothes, stating "I will die if I take this off." What is the best intervention?', a: ['Acknowledge their anxiety and allow them to remain in the clothes', 'Force them to change for hygiene reasons', 'Tell them they are dirty and must shower', 'Medicate them with a chemical restraint'], correct: 0, rationale: 'This is a narrowed self-concept. Taking away their clothes/room destroys their identity. Acknowledge the feeling and do not force them.' },
                    { topic: 'Ideas of Reference', fact: 'The delusional belief that completely unrelated events are about the patient.', alert: 'E.g., "The news anchor is giving me a secret message."', q: 'A patient watching a commercial suddenly says, "That actor is telling me I need to save the world." What is this called?', a: ['Ideas of reference', 'Grandiose delusion', 'Somatic delusion', 'Auditory hallucination'], correct: 0, rationale: 'Ideas of reference occur when a patient believes harmless, external events (like TV or radio) have a special, personal meaning meant only for them.' }
                ]
            },
            defense_mech: {
                title: 'Defense Mechanisms',
                color: 'bg-pink',
                type: 'defense_mech',
                description: 'Klimek 4: Unconscious and conscious ways patients reduce anxiety.',
                data: [
                    { topic: 'Purpose of Defenses', fact: 'The primary purpose is to reduce <span class="highlight-term">anxiety</span>.', alert: 'They are not always unhealthy; they are often necessary coping tools.', q: 'According to Klimek, what is the primary purpose of defense mechanisms?', a: ['To reduce anxiety', 'To manipulate staff', 'To cure psychosis', 'To maintain a delusion'], correct: 0, rationale: 'Defense mechanisms are often healthy because they reduce acute anxiety and protect the ego.' },
                    { topic: 'Repression vs. Denial', fact: 'Repression = <span class="highlight-term">UNCONSCIOUS</span> refusal to accept reality. Denial = <span class="highlight-term">CONSCIOUS</span>.', alert: 'Repression is strongly linked to psychosomatic illness.', q: 'A patient consciously chooses to disbelieve their terminal diagnosis. Which defense mechanism are they using?', a: ['Denial', 'Repression', 'Displacement', 'Projection'], correct: 0, rationale: 'Denial is a conscious choice to disbelieve reality, whereas repression is an unconscious block.' },
                    { topic: 'Reaction Formation', fact: 'Expressing the exact <span class="highlight-term">opposite</span> of what you actually feel.', alert: 'E.g., Being overly sweet to someone you secretly hate.', q: 'A patient who despises their roommate goes out of their way to buy them gifts and be excessively kind. What is this?', a: ['Reaction formation', 'Displacement', 'Rationalization', 'Projection'], correct: 0, rationale: 'Reaction formation involves forming the opposite reaction to hide an unacceptable true feeling.' },
                    { topic: 'Projection', fact: 'Taking your own unacceptable feelings and blaming others.', alert: '"I am not mad, YOU are mad!"', q: 'A patient who is secretly drinking alcohol says, "My wife is the one with the drinking problem, not me." This is an example of:', a: ['Projection', 'Rationalization', 'Intellectualization', 'Denial'], correct: 0, rationale: 'Projection is placing your own faults or feelings onto someone else to avoid dealing with them.' },
                    { topic: 'Displacement', fact: 'Shifting emotions to a <span class="highlight-term">safer target</span>.', alert: 'E.g., Getting yelled at by the boss, so you go home and kick the dog.', q: 'A patient is angry at the doctor but yells at the nurse instead. What defense mechanism is this?', a: ['Displacement', 'Reaction formation', 'Regression', 'Projection'], correct: 0, rationale: 'Displacement redirects anger or emotion from a threatening target (the doctor) to a safer, less threatening target (the nurse).' },
                    { topic: 'Intellectualization', fact: 'Giving cold, clinical details about an upsetting event to avoid emotion.', alert: 'Acting cool and calm while discussing severe trauma.', q: 'A patient diagnosed with cancer speaks purely about the statistics and cell pathology without showing any emotion. What is this?', a: ['Intellectualization', 'Rationalization', 'Repression', 'Denial'], correct: 0, rationale: 'Intellectualization removes the emotion from a traumatic event by focusing intensely on logic and clinical facts.' },
                    { topic: 'Regression', fact: 'Reverting to childlike, demanding, or attention-seeking behavior.', alert: 'Common during severe illness or hospitalization.', q: 'An adult patient begins throwing a tantrum and demanding their nurse feed them. What defense mechanism is occurring?', a: ['Regression', 'Reaction formation', 'Displacement', 'Projection'], correct: 0, rationale: 'Regression is reverting to an earlier stage of development (childlike behavior) to cope with stress.' }
                ]
            },
            violent_client: {
                title: 'The Violent Client',
                color: 'bg-orange',
                type: 'violent_client',
                description: 'Klimek 4: Protocols for de-escalating and managing aggressive psychiatric patients.',
                data: [
                    { topic: 'Warning Signs', fact: '<span class="highlight-term">Pacing</span> and increased motor activity are early warning signs.', alert: 'Alcohol/drug use also dramatically increases the risk of violence.', q: 'What is a common early warning sign of potential violence in a psychiatric patient?', a: ['Pacing and increased motor activity', 'Sleeping excessively', 'Crying quietly', 'Refusing to eat'], correct: 0, rationale: 'Pacing, clenching fists, and increasing motor activity indicate rising agitation and potential violence.' },
                    { topic: 'De-escalation (Early)', fact: 'If the client is not yet out of control, the #1 strategy is to <span class="highlight-term">decrease environmental stimuli</span>.', alert: 'Dim lights, ask visitors to leave, remove from chaos.', q: 'A patient is pacing the dayroom and becoming agitated, but has not acted out. What is the priority nursing intervention?', a: ['Decrease environmental stimuli', 'Call for a physical take-down team', 'Administer an IM sedative immediately', 'Place them in 4-point restraints'], correct: 0, rationale: 'Before violence occurs, the best intervention is to remove triggers and decrease stimuli to help them calm down.' },
                    { topic: 'Initial Approach', fact: 'Give them space. Do NOT move in close.', alert: 'Say: "My name is [X] and I am a nurse." Then explain what you are going to do.', q: 'When first approaching a highly agitated client, what should the nurse do?', a: ['Give them space and clearly state your name and role', 'Move in very close to provide a sense of security', 'Touch their shoulder gently', 'Demand they go to their room'], correct: 0, rationale: 'Moving into their personal space threatens them. Stand at a safe distance, identify yourself, and speak calmly.' },
                    { topic: 'Overt Violence Protocol', fact: '<span class="highlight-term">NEVER</span> be alone with a violent client. Get trained personnel.', alert: 'Never ask family or other patients to help subdue them.', q: 'A patient becomes overtly violent and begins throwing chairs. What is the nurse\'s FIRST action?', a: ['Call for trained personnel (Code/Team)', 'Attempt to physically restrain the patient alone', 'Ask nearby family members to help hold them', 'Leave the unit entirely'], correct: 0, rationale: 'Safety is the absolute priority. Never attempt to restrain a violent client alone; always gather a trained team.' },
                    { topic: 'Subduing the Client', fact: 'Give them a chance to calm down themselves first.', alert: 'Once the team is assembled, <span class="highlight-term">ONLY ONE PERSON</span> should talk to the patient.', q: 'A take-down team has surrounded a violent patient. What is a critical rule during this intervention?', a: ['Only one staff member should talk to the patient', 'Everyone should yell commands so the patient hears them', 'The patient should immediately be tackled', 'The nurse must show fear to gain sympathy'], correct: 0, rationale: 'Having multiple people talking causes confusion and panic. One designated leader communicates clear, consistent limits to the patient.' },
                    { topic: 'Staff Approach', fact: 'Set limits and do it <span class="highlight-term">consistently</span>.', alert: 'The nurse must not show fear, as this frightens the patient more.', q: 'What is the best overall staff approach for controlling impulsive outbreaks of violence?', a: ['Setting limits and enforcing them consistently', 'Bargaining and negotiating with the patient', 'Isolating the patient at all times', 'Allowing the violence to run its course'], correct: 0, rationale: 'Violent or impulsive clients need structure. Consistent, firm limit-setting makes them feel safe because someone is in control.' }
                ]
            }
        };

        // --- Logic ---
        let currentTab = 'crutches';
        let currentItem = contentData.crutches.data[0];
        let quizIndex = 0;
        let quizScore = 0;
        let currentQuizData = []; 

        // Audio Context for Beeps
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
                osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        // Shuffle function (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- Study Card Modal Logic ---
        let cardIndex = 0;

        function renderCardInModal(item, data, idx, total) {
            document.getElementById('card-modal-header').className = 'card-modal-header ' + data.color;
            document.getElementById('card-modal-title').textContent = data.title + ' \u2014 Study Cards';
            document.getElementById('card-counter').textContent = (idx + 1) + ' / ' + total;
            document.getElementById('card-prev-btn').disabled = (idx === 0);
            document.getElementById('card-next-btn').disabled = (idx >= total - 1);
            document.getElementById('card-modal-body').innerHTML =
                '<div class="card-topic">' + item.topic + '</div>' +
                '<div class="card-section">' +
                    '<span class="card-label">Key Fact</span>' +
                    '<div class="card-fact">' + item.fact + '</div>' +
                '</div>' +
                '<div class="card-section">' +
                    '<div class="card-alert-box">' +
                        '<span class="card-label" style="color:#b91c1c;">\u26a0\ufe0f Clinical Alert</span>' +
                        '<div class="card-fact">' + item.alert + '</div>' +
                    '</div>' +
                '</div>';
        }

        window.openCards = function(startIdx) {
            var data = contentData[currentTab];
            cardIndex = (typeof startIdx === 'number') ? startIdx : 0;
            renderCardInModal(data.data[cardIndex], data, cardIndex, data.data.length);
            document.getElementById('card-modal').style.display = 'flex';
        };
        window.prevCard = function() {
            var data = contentData[currentTab];
            if (cardIndex > 0) { cardIndex--; renderCardInModal(data.data[cardIndex], data, cardIndex, data.data.length); }
        };
        window.nextCard = function() {
            var data = contentData[currentTab];
            if (cardIndex < data.data.length - 1) { cardIndex++; renderCardInModal(data.data[cardIndex], data, cardIndex, data.data.length); }
        };
        window.closeCards = function() {
            document.getElementById('card-modal').style.display = 'none';
        };

        function renderFocusCard(item, data) {
            if (!item || !data) return '';
            return `
                <div class="focus-card" style="border-color:${getComputedStyle(document.documentElement).getPropertyValue('--' + data.color.split('-')[1])};">
                    <div class="focus-card-header ${data.color}">
                        Study Card
                    </div>
                    <div class="focus-card-body">
                        <div>
                            <span class="focus-label">Topic</span>
                            <div class="focus-content" style="font-weight:800; font-size:1.3rem;">${item.topic}</div>
                        </div>
                        <div>
                            <span class="focus-label">Key Fact</span>
                            <div class="focus-content">${item.fact}</div>
                        </div>
                        <div class="focus-alert-box">
                            <span class="focus-label" style="color:#b91c1c;">⚠️ Clinical Alert</span>
                            <div class="focus-content" style="font-size:1rem;">${item.alert}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.switchTab = function(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = 'tab-btn'; // Reset
                if(btn.id === `tab-${tabName}`) {
                    btn.classList.add('active');
                    if(contentData[tabName]) btn.classList.add(contentData[tabName].color);
                } else {
                    var bKey = btn.id.replace('tab-','');
                    if(contentData[bKey]) btn.classList.add(contentData[bKey].color);
                }
            });
            if (contentData[currentTab] && contentData[currentTab].data && contentData[currentTab].data.length > 0) {
                currentItem = contentData[currentTab].data[0];
                renderGuide();
            }
        }

        function renderGuide() {
            const container = document.getElementById('content-area');
            const data = contentData[currentTab];
            const descArea = document.getElementById('desc-area');

            if (descArea && data) {
                if(data.description) {
                    descArea.innerHTML = data.description;
                    descArea.style.display = 'block';
                } else {
                    descArea.style.display = 'none';
                }
            }
            
            if (!data || !data.data) return;

            const rows = data.data.map((item, idx) => `
                <tr onclick="selectRow(this, ${idx})" class="${currentItem === item ? 'selected' : ''}">
                    <td class="topic-cell ${data.type}">${item.topic}</td>
                    <td class="key-point-cell">${item.fact}</td>
                    <td class="alert-cell">${item.alert}</td>
                </tr>
            `).join('');

            const content = `
                <div class="section-header-bar ${data.color}">
                    <span>${data.title}</span>
                    <button class="header-quiz-btn" onclick="startQuiz()">Take Quiz</button>
                </div>
                <div class="grid-layout">
                    <div>
                        <div class="table-container">
                            <table>
                                <thead><tr><th>Topic</th><th>Clinical Fact</th><th>Nursing Priority / Alerts</th></tr></thead>
                                <tbody id="table-body">${rows}</tbody>
                            </table>
                        </div>
                    </div>
                    <div>
                        <div class="visual-container" id="desktop-focus-card" style="background:none; border:none; padding-top:0;">
                            ${renderFocusCard(currentItem, data)}
                        </div>
                    </div>
                </div>
            `;
            if (container) {
                container.innerHTML = content;
            }
        }

        window.selectRow = function(rowEl, index) {
            document.querySelectorAll('#table-body tr').forEach(function(r) { r.classList.remove('selected'); });
            rowEl.classList.add('selected');
            
            currentItem = contentData[currentTab].data[index];
            const deskCard = document.getElementById('desktop-focus-card');
            if (deskCard) {
                deskCard.innerHTML = renderFocusCard(currentItem, contentData[currentTab]);
            }
        };

        window.startQuiz = function() {
            document.getElementById('quiz-modal').style.display = 'flex';
            currentQuizData = contentData[currentTab].data; 
            quizIndex = 0;
            quizScore = 0;
            loadQuestion();
        }

        window.closeQuiz = function() {
            document.getElementById('quiz-modal').style.display = 'none';
        }

        function loadQuestion() {
            if (!currentQuizData || currentQuizData.length === 0) return;
            const qData = currentQuizData[quizIndex];
            document.getElementById('q-num-display').innerText = quizIndex + 1;
            document.getElementById('quiz-progress').innerText = `Question ${quizIndex + 1} of ${currentQuizData.length}`;
            document.getElementById('q-text').innerText = qData.q;
            
            document.getElementById('feedback-area').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            
            const optionsContainer = document.getElementById('q-options');
            if (optionsContainer) {
                optionsContainer.innerHTML = '';

                let answerObjects = qData.a.map((ans, index) => ({ text: ans, originalIndex: index }));
                answerObjects = shuffleArray(answerObjects);

                const letters = ['A', 'B', 'C', 'D'];
                
                answerObjects.forEach((ansObj, idx) => {
                    const btn = document.createElement('div');
                    btn.className = 'quiz-option';
                    btn.dataset.originalIndex = ansObj.originalIndex;
                    
                    btn.innerHTML = `
                        <div class="quiz-option-letter ${letters[idx]}">${letters[idx]}</div> 
                        <div style="flex-grow:1;">${ansObj.text}</div>
                        <div class="correct-check" style="display:none; color:#10b981; font-weight:bold; font-size:1.2rem; margin-left:0.5rem;">✔</div>
                    `;
                    
                    btn.onclick = () => checkAnswer(ansObj.originalIndex, btn, optionsContainer);
                    optionsContainer.appendChild(btn);
                });
            }
        }

        window.checkAnswer = function(selectedOriginalIndex, btnElement, optionsContainer) {
            const qData = currentQuizData[quizIndex];
            const options = optionsContainer.querySelectorAll('.quiz-option');
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackHeader = document.getElementById('feedback-header');
            const rationaleText = document.getElementById('rationale-text');
            const nextBtn = document.getElementById('next-btn');

            options.forEach(opt => opt.style.pointerEvents = 'none');

            let visualCorrectLetter = 'A';
            let correctOptionDom = null;
            Array.from(options).forEach((opt, idx) => {
                if (parseInt(opt.dataset.originalIndex) === qData.correct) {
                    visualCorrectLetter = ['A', 'B', 'C', 'D'][idx];
                    correctOptionDom = opt;
                }
            });

            if (rationaleText) rationaleText.innerHTML = `<div class="rationale-pill">Rationale:</div><div style="color: #e2e8f0; font-size: 0.95rem;">${qData.rationale || "No rationale provided."}</div>`;
            if (feedbackArea) feedbackArea.style.display = 'block';
            if (nextBtn) nextBtn.style.display = 'block';

            let isCorrect = (selectedOriginalIndex === qData.correct);

            if (feedbackArea) feedbackArea.style.borderColor = isCorrect ? '#10b981' : '#ef4444';
            
            const statusBadge = isCorrect 
                ? '<span class="feedback-badge badge-correct">✔ Correct</span>' 
                : '<span class="feedback-badge badge-incorrect">✖ Incorrect</span>';
            const answerBadge = `<span class="feedback-badge badge-answer">Answer: ${visualCorrectLetter}</span>`;

            if (feedbackHeader) {
                feedbackHeader.innerHTML = `${statusBadge} ${answerBadge}`;
            }

            if(isCorrect) {
                btnElement.classList.add('correct-choice');
                btnElement.querySelector('.correct-check').style.display = 'block';
                try { playSound('correct'); } catch(e){}
                quizScore++;
            } else {
                btnElement.classList.add('wrong-choice');
                if(correctOptionDom) {
                    correctOptionDom.classList.add('correct-choice');
                    correctOptionDom.querySelector('.correct-check').style.display = 'block';
                }
                try { playSound('wrong'); } catch(e){}
            }
            
            if (nextBtn) {
                if (quizIndex >= currentQuizData.length - 1) {
                    nextBtn.textContent = 'Finish (' + quizScore + '/' + currentQuizData.length + ')';
                } else {
                    nextBtn.textContent = 'Next Question';
                }
            }

            setTimeout(() => {
                const quizBox = document.querySelector('.quiz-box');
                if (quizBox) {
                    quizBox.scrollTo({
                        top: quizBox.scrollHeight,
                        behavior: 'smooth'
                    });
                }
            }, 100);
        }

        window.nextQuestion = function() {
            quizIndex++;
            if(quizIndex < currentQuizData.length) {
                loadQuestion();
                const quizBox = document.querySelector('.quiz-box');
                if (quizBox) quizBox.scrollTop = 0;
            } else {
                const optionsContainer = document.getElementById('q-options');
                const qText = document.getElementById('q-text');
                if (qText) qText.innerText = "Quiz Complete!";
                if (optionsContainer) {
                    optionsContainer.innerHTML = `
                        <div style="text-align:center; padding:2rem; background: rgba(255,255,255,0.05); border-radius: 1rem;">
                            <h2 style="font-size: 2rem; margin-bottom: 1rem; color: white;">You scored ${quizScore} / ${currentQuizData.length}</h2>
                            <button class="action-btn" style="width:100%; max-width: 300px; background-color: var(--accent-gold); color: white;" onclick="closeQuiz()">Return to Guide</button>
                        </div>
                    `;
                }
                const feedbackArea = document.getElementById('feedback-area');
                const nextBtn = document.getElementById('next-btn');
                const qNumDisplay = document.getElementById('q-num-display');
                if (feedbackArea) feedbackArea.style.display = 'none';
                if (nextBtn) nextBtn.style.display = 'none';
                if (qNumDisplay) qNumDisplay.style.display = 'none';
            }
        }

        window.addEventListener('resize', function() {
            if(document.getElementById('content-area').innerHTML !== "") {
                if (window.innerWidth <= 600) {
                    document.getElementById('mobile-card-btn').style.display = 'inline-block';
                    document.getElementById('desktop-focus-card').style.display = 'none';
                } else {
                    document.getElementById('mobile-card-btn').style.display = 'none';
                    document.getElementById('desktop-focus-card').style.display = 'flex';
                }
            }
        });

        // Init
        switchTab('crutches'); 
    })();
    </script>
</div>

</body>
