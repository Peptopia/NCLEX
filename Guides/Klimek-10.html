<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📘 Klimek 10: Maternity & Neonatology</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; min-height: 100vh; min-height: 100dvh; background: #b8aad0; }
        html.dark, html.dark body { background: #0f172a; }
    </style>
</head>
<body>
<script>
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.classList.add('dark');
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(event) {
    if (event.matches) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }
});
</script>

<!-- Peptopia Klimek Guide Widget -->
<div id="peptopia-klimek-guide">
    <style>
        /* --- Scoped Styles --- */
        #peptopia-klimek-guide {
            --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
            --slate-700: #334155; --slate-800: #1e293b; --slate-900: #0f172a; --white: #ffffff;
            --rose-500: #fb7185; --blue-500: #06b6d4; --purple-500: #8b5cf6;
            --emerald-500: #10b981; --amber-500: #d97706; --pink-500: #ec4899; 
            --indigo-500: #6366f1; --orange-500: #f97316;
            
            /* Backgrounds (Pale versions for selection) */
            --rose-50: #fff1f2; --blue-50: #ecfeff; --purple-50: #f5f3ff;
            --emerald-50: #ecfdf5; --amber-50: #fffbeb; --pink-50: #fdf2f8; 
            --indigo-50: #eef2ff; --orange-50: #fff7ed;

            /* Alert Colors */
            --alert-bg: #fff7ed;
            --alert-border: #fdba74;
            --alert-text: #1e293b;
            
            /* UI Accents */
            --accent-gold: #f59e0b; 
            
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: transparent; color: var(--slate-900); line-height: 1.6;
            font-size: 16px; max-width: 76rem; margin: 0 auto; padding: 0.75rem;
            box-sizing: border-box; -webkit-text-size-adjust: 100%;
        }
        html.dark #peptopia-klimek-guide {
            --slate-50: #0f172a; --slate-100: #1e293b; --slate-200: #334155;
            --slate-700: #cbd5e1; --slate-800: #0f172a; --slate-900: #f1f5f9; --white: #1e293b;
            --rose-50: #1a0a0d; --blue-50: #0a1a1f; --purple-50: #0f0a1f;
            --emerald-50: #0a1a12; --amber-50: #1a150a; --pink-50: #1a0a14; 
            --indigo-50: #0a0e1f; --orange-50: #1a110a;
            --alert-bg: #1a150a; --alert-border: #92400e; --alert-text: #f1f5f9;
            background-color: transparent; color: #f1f5f9;
        }
        #peptopia-klimek-guide * { box-sizing: border-box; }
        
        #peptopia-klimek-guide .highlight-term {
            background-color: #fef08a; color: #000; padding: 0.1rem 0.4rem;
            border-radius: 0.25rem; font-weight: 800; display: inline-block; margin-bottom: 2px;
        }
        html.dark #peptopia-klimek-guide .highlight-term { background-color: #fde68a; color: #1e1b4b; }
        
        /* Navbar */
        #peptopia-klimek-guide .navbar {
            background: linear-gradient(135deg, #0a1628 0%, #0c2461 50%, #0a1628 100%);
            color: #fff; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 16px -2px rgba(10, 22, 40, 0.5), 0 0 20px rgba(30, 100, 255, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.25);

        html.dark #peptopia-klimek-guide .navbar { background: linear-gradient(135deg, #020617 0%, #0c2461 50%, #020617 100%); border: 1px solid rgba(59, 130, 246, 0.3); }
        #peptopia-klimek-guide .nav-title { font-weight: 800; font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; text-align: center; }
        
        /* Tabs */
        #peptopia-klimek-guide .tabs-container {
            display: flex; flex-wrap: nowrap; gap: 0.5rem; margin-bottom: 0.5rem;
            overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 0.5rem; scrollbar-width: thin;

        #peptopia-klimek-guide .tab-btn {

            filter: grayscale(0%) opacity(1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 0 0 2px rgba(255,255,255,0.3);

        /* Tab Colors */
        #peptopia-klimek-guide #tab-preg { background-color: var(--rose-500); }
        #peptopia-klimek-guide #tab-labor { background-color: var(--blue-500); }
        #peptopia-klimek-guide #tab-comp { background-color: var(--purple-500); }
        #peptopia-klimek-guide #tab-fhr { background-color: var(--emerald-500); }
        #peptopia-klimek-guide #tab-post { background-color: var(--amber-500); }

        /* Section Header Bar */

        }

        #peptopia-klimek-guide .card-modal-header .card-close-btn {

        html.dark #peptopia-klimek-guide .card-modal-body .card-topic { color: #f1f5f9; }
        #peptopia-klimek-guide .card-modal-body .card-section { margin-bottom: 1rem; }

        html.dark #peptopia-klimek-guide .card-modal-body .card-alert-box { background: #1c1012; border-left-color: #be123c; }
        #peptopia-klimek-guide .card-modal-body .card-alert-box .card-fact { font-size: 0.95rem; }
        #peptopia-klimek-guide .card-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem 1rem; border-top: 1px solid var(--slate-200); gap: 0.5rem;
        }
        html.dark #peptopia-klimek-guide .card-nav { border-top-color: #334155; }
        #peptopia-klimek-guide .card-nav-btn {
            background: #4f46e5; color: white; border: none; padding: 0.55rem 1.25rem;
            border-radius: 2rem; font-weight: 700; cursor: pointer; font-size: 0.9rem;

        #peptopia-klimek-guide .card-counter { font-size: 0.85rem; font-weight: 700; color: #64748b; white-space: nowrap; }
        html.dark #peptopia-klimek-guide .card-counter { color: #94a3b8; }

        /* Main Grid */
        #peptopia-klimek-guide .grid-layout { display: flex; flex-direction: column; gap: 1.5rem; align-items: flex-start; } 
        @media (min-width: 850px) {
            #peptopia-klimek-guide .grid-layout { flex-direction: row; }
            #peptopia-klimek-guide .grid-layout > div:first-child { flex: 2; width: 100%; } /* Left Col */
            #peptopia-klimek-guide .grid-layout > div:last-child { flex: 1; width: 100%; position: sticky; top: 1rem; }  /* Right Col */
        }

        /* Description Box */
        #peptopia-klimek-guide .description-box {
            padding: 1rem; background: #ffffff; 
            border: 2px solid #e2e8f0; border-radius: 0.5rem;
            border-left: 6px solid var(--slate-700);
            font-size: 1.05rem; color: #000000; font-weight: 500;
            margin-bottom: 1.5rem;
        }

        /* Data Table */
        #peptopia-klimek-guide .table-container { 
            overflow-x: auto; -webkit-overflow-scrolling: touch; 
            border: 2px solid #334155; border-radius: 0.75rem; 
            background: white; max-height: 600px; overflow-y: auto; 
        }
        html.dark #peptopia-klimek-guide .table-container { background: #1e293b; border-color: #475569; }
        #peptopia-klimek-guide table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        #peptopia-klimek-guide th { 
            padding: 0.75rem; background-color: #f1f5f9; color: #0f172a; 
            border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 5; 
            font-weight: 800; font-size: 0.9rem;

        #peptopia-klimek-guide td { padding: 0.75rem; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
        html.dark #peptopia-klimek-guide td { border-bottom-color: #334155; color: #e2e8f0; }
        #peptopia-klimek-guide tr:hover td { cursor: pointer; background-color: #f8fafc; filter: brightness(98%); }
        html.dark #peptopia-klimek-guide tr:hover td { background-color: #1e293b; }
        #peptopia-klimek-guide tr.selected td { border-left: 5px solid var(--accent-gold); background-color: #fffbeb; }
        html.dark #peptopia-klimek-guide tr.selected td { background-color: #1c1917; }

        /* Cell Specifics */
        #peptopia-klimek-guide .topic-cell { font-weight: 800; width: 1%; white-space: nowrap; color: #000; vertical-align: top; }
        html.dark #peptopia-klimek-guide .topic-cell { color: #f1f5f9; }

        #peptopia-klimek-guide .topic-cell.labor { background-color: var(--blue-50); }
        #peptopia-klimek-guide .topic-cell.comp { background-color: var(--purple-50); }
        #peptopia-klimek-guide .topic-cell.fhr { background-color: var(--emerald-50); }
        #peptopia-klimek-guide .topic-cell.post { background-color: var(--amber-50); }

        #peptopia-klimek-guide .key-point-cell { color: #334155; font-style: normal; font-weight: 500; }
        html.dark #peptopia-klimek-guide .key-point-cell { color: #cbd5e1; }
        #peptopia-klimek-guide .alert-cell { color: #991b1b; background-color: #fef2f2; border-left: 3px solid #f87171; font-weight: 600; }
        html.dark #peptopia-klimek-guide .alert-cell { background-color: #1c1012; color: #fca5a5; border-left-color: #dc2626; }

        @media (max-width: 600px) {

            #peptopia-klimek-guide th, #peptopia-klimek-guide td, #peptopia-klimek-guide tr { display: block; width: 100%; }

            #peptopia-klimek-guide tr { border-bottom: 2px solid #e2e8f0; padding: 0.6rem 0; margin-bottom: 0.35rem; }
            html.dark #peptopia-klimek-guide tr { border-bottom-color: #334155; }

            #peptopia-klimek-guide tr.selected td { border-left: none; }
            #peptopia-klimek-guide tr.selected { border-left: 4px solid var(--accent-gold); background: #fffbeb; border-radius: 0.5rem; }
            html.dark #peptopia-klimek-guide tr.selected { background: #1c1917; }

        html.dark #peptopia-klimek-guide .focus-card { background: #1e293b; }

        html.dark #peptopia-klimek-guide .focus-content { color: #f1f5f9; }
        #peptopia-klimek-guide .focus-alert-box {

        }
        html.dark #peptopia-klimek-guide .focus-alert-box { background: #1c1012; border-left-color: #be123c; }

    <script>
    (function() {
        // --- DATA FOR KLIMEK 10 ---
        const contentData = {
            preg: {

                color: 'bg-rose',
                type: 'preg',
                description: 'Klimek 10: Naegele\'s Rule, Weight Gain, Fundal Height, and Pregnancy Signs.',
                data: [
                    { topic: 'Naegele\'s Rule', fact: 'To calculate due date (EDD): Take First Day of Last Menstrual Period (LMP). <span class="highlight-term">Add 7 days, subtract 3 months</span>.', alert: 'Always check the year to make sure it makes sense.', q: 'A patient\'s LMP began on June 10th. What is her Estimated Date of Delivery (EDD)?', a: ['March 17th of the following year', 'March 3rd of the following year', 'September 17th of the current year', 'April 10th of the following year'], correct: 0, rationale: 'June 10 + 7 days = June 17. June minus 3 months = March. Therefore, March 17th.' },
                    { topic: 'Total Weight Gain', fact: 'Normal weight gain for the entire pregnancy is <span class="highlight-term">28 lbs</span> (plus or minus 3 lbs).', alert: 'Underweight moms should gain more; overweight moms should gain less.', q: 'What is the expected total weight gain for a woman with a normal BMI during pregnancy?', a: ['28 lbs +/- 3 lbs', '15 lbs', '40 lbs', '10 lbs'], correct: 0, rationale: 'A healthy weight gain is generally accepted as 25 to 31 pounds (28 +/- 3 lbs).' },
                    { topic: 'Trimester Weight Gain', fact: '1st Trimester: <span class="highlight-term">1 lb per month</span> (3 lbs total). 2nd & 3rd Trimesters: <span class="highlight-term">1 lb per week</span>.', alert: 'Formula: Week of gestation minus 9 = Expected Weight Gain.', q: 'A woman is in her 20th week of gestation. How much weight should she have gained by now?', a: ['11 lbs', '20 lbs', '5 lbs', '15 lbs'], correct: 0, rationale: 'Using Klimek\'s formula: Week 20 minus 9 = 11 lbs.' },
                    { topic: 'Fundal Height Palpation', fact: 'Fundus is NOT palpable until week <span class="highlight-term">12</span>.', alert: 'If you can palpate it in the first trimester, it\'s a hydatidiform mole or a miscalculated due date.', q: 'At what week of gestation does the fundus become palpable above the symphysis pubis?', a: ['Week 12', 'Week 8', 'Week 20', 'Week 24'], correct: 0, rationale: 'The uterus does not rise out of the pelvis and become palpable until the end of the first trimester (week 12).' },
                    { topic: 'Fundus at Umbilicus', fact: 'The fundus reaches the umbilicus at <span class="highlight-term">20-22 weeks</span> of gestation.', alert: 'This is the milestone for viability.', q: 'Where should the nurse expect to palpate the fundus of a patient who is 22 weeks pregnant?', a: ['At the level of the umbilicus', 'Midway between the symphysis and the umbilicus', 'At the xiphoid process', 'Not palpable yet'], correct: 0, rationale: 'The fundus reaches the belly button right around 20-22 weeks.' },
                    { topic: 'Positive Signs of Pregnancy', fact: 'No "maybes". 1. Fetal Skeleton on X-ray. 2. Fetal presence on Ultrasound. 3. Auscultation of Fetal Heart Rate.', alert: '4. Examiner palpates fetal movement (NOT the mother).', q: 'Which of the following is considered a POSITIVE (absolute diagnostic) sign of pregnancy?', a: ['Auscultation of a fetal heart rate by the examiner', 'A positive urine pregnancy test', 'Morning sickness and amenorrhea', 'The mother reporting feeling fetal movement'], correct: 0, rationale: 'Positive signs are irrefutable evidence of a fetus. Pregnancy tests can be false positive, and mom\'s sensation (quickening) is subjective. Hearing the heartbeat is absolute.' },
                    { topic: 'Probable/Presumptive Signs', fact: 'Positive pregnancy test. Chadwick\'s, Goodell\'s, Hegar\'s signs.', alert: 'Alphabetical order: Chadwick (Color), Goodell (Soft Cervix), Hegar (Soft lower Uterus).', q: 'What is Chadwick\'s sign?', a: ['Bluish discoloration of the cervix and vagina', 'Softening of the cervix', 'Softening of the lower uterine segment', 'Dark line down the abdomen'], correct: 0, rationale: 'Remember alphabetical: Chadwick (C) is Color change (blue). Goodell (G) is cervical softening. Hegar (H) is lower uterine softening.' },
                    { topic: 'Office Visits', fact: 'Once a month until week 28. Every 2 weeks until week 36. Every week until delivery.', alert: 'Week 42 = Induction or C-section.', q: 'A patient is 32 weeks pregnant. How often should she be scheduled for prenatal visits?', a: ['Every 2 weeks', 'Once a month', 'Once a week', 'Twice a week'], correct: 0, rationale: 'From week 28 to week 36, visits increase to every 2 weeks.' }
                ]
            },
            labor: {

                type: 'labor',
                description: 'Klimek 10: Dilation, Effacement, Station, and the 4 Stages of Labor.',
                data: [
                    { topic: 'Dilation & Effacement', fact: 'Dilation: Opening of cervix (0-10 cm). Effacement: Thinning of cervix (0-100%).', alert: 'Cervix must be 10cm and 100% effaced to push.', q: 'What does 100% effacement mean?', a: ['The cervix is completely thinned out', 'The cervix is completely open', 'The baby has dropped into the pelvis', 'The water has broken'], correct: 0, rationale: 'Effacement refers to the thinning and shortening of the cervix during labor. 100% means it is completely thinned.' },
                    { topic: 'Station & Engagement', fact: 'Station: Relationship of fetal presenting part to Mom\'s <span class="highlight-term">ischial spines</span>.', alert: 'Negative = Above spines. Zero = At spines (Engaged). Positive = Below spines.', q: 'A fetal station of +2 means the presenting part is:', a: ['2 cm below the ischial spines', '2 cm above the ischial spines', 'Not yet engaged in the pelvis', 'Crowning at the perineum'], correct: 0, rationale: 'Positive numbers mean the baby has passed the narrowest part of the pelvis (ischial spines) and is making positive progress toward delivery.' },
                    { topic: 'Stage 1: Labor', fact: 'The entire period of opening the cervix. Has 3 phases: Latent, Active, Transition.', alert: 'Do NOT confuse the STAGE of labor with the PHASE of labor.', q: 'What is the primary purpose of Stage 1 of labor?', a: ['To dilate and efface the cervix', 'To deliver the baby', 'To deliver the placenta', 'To recover from delivery'], correct: 0, rationale: 'Stage 1 is the process of getting the cervix from closed (0cm) to fully open (10cm).' },
                    { topic: 'Phase 1: Latent', fact: 'Dilation: 0-4 cm. Frequency: 5-30 mins. Duration: 15-30 secs.', alert: 'Pain is mild. Patient is sociable.', q: 'A patient is 3 cm dilated and contractions are 10 minutes apart. What phase of labor is she in?', a: ['Latent Phase (Stage 1)', 'Active Phase (Stage 1)', 'Transition Phase (Stage 1)', 'Stage 2'], correct: 0, rationale: '0-4 cm is the early/latent phase of the first stage of labor.' },
                    { topic: 'Phase 2: Active', fact: 'Dilation: <span class="highlight-term">5-7 cm</span>. Frequency: 3-5 mins. Duration: 30-60 secs.', alert: 'Pain management (epidural) usually occurs here.', q: 'What is the characteristic cervical dilation range for the Active phase of labor?', a: ['5 to 7 cm', '0 to 4 cm', '8 to 10 cm', '10 cm exactly'], correct: 0, rationale: 'Active labor is the middle phase of Stage 1, defined by 5-7 cm dilation and contractions every 3-5 minutes.' },
                    { topic: 'Phase 3: Transition', fact: 'Dilation: <span class="highlight-term">8-10 cm</span>. Frequency: 2-3 mins. Duration: 60-90 secs.', alert: 'Intense pain, urge to push, N/V, irritability.', q: 'A patient is 9 cm dilated and yelling that she cannot do this anymore. Contractions are 2 minutes apart. What phase is she in?', a: ['Transition Phase', 'Active Phase', 'Second Stage', 'Latent Phase'], correct: 0, rationale: 'Transition is the final, most intense phase of Stage 1 (8-10 cm), characterized by loss of control and overwhelming intensity.' },
                    { topic: 'Stage 2: Delivery of Baby', fact: 'From 10cm dilation to the delivery of the infant.', alert: 'Priority: Suction mouth, then nose. Check for nuchal cord.', q: 'As the baby\'s head is delivered during Stage 2, what is the nurse\'s priority action?', a: ['Suction the mouth first, then the nose', 'Immediately cut the umbilical cord', 'Deliver the placenta', 'Slap the baby\'s back to stimulate crying'], correct: 0, rationale: 'Airway is always priority. Suction mouth then nose (alphabetical M before N) to prevent aspiration of fluid with the first breath.' },
                    { topic: 'Stage 3: Delivery of Placenta', fact: 'Priority: Make sure it is intact.', alert: 'Look for <span class="highlight-term">3 vessels</span>: 2 Arteries, 1 Vein (AVA).', q: 'What must the nurse verify upon delivery of the placenta in Stage 3?', a: ['That the placenta is intact and the cord has 2 arteries and 1 vein', 'That the uterus is perfectly firm', 'That the baby is breathing', 'That the mother is ready to breastfeed'], correct: 0, rationale: 'A retained placental fragment will cause fatal hemorrhage. The cord must be inspected for AVA (Artery, Vein, Artery) to rule out congenital anomalies.' },
                    { topic: 'Stage 4: Recovery', fact: 'The first <span class="highlight-term">2 hours</span> after the placenta is delivered.', alert: 'Remember the 4 things you do 4 times an hour in the 4th stage.', q: 'During the recovery stage (Stage 4), how often should assessments be performed?', a: ['Every 15 minutes (4 times an hour)', 'Every 30 minutes', 'Every hour', 'Continuously'], correct: 0, rationale: 'In the first two hours postpartum (Stage 4), you do 4 things every 15 minutes: Vitals, Fundus check, Pad check, Roll mom to check for pooling blood.' }
                ]
            },
            comp: {
                title: 'Complications & LION',
                color: 'bg-purple',
                type: 'comp',
                description: 'Klimek 10: How to handle obstetric emergencies (LION) and pain meds.',
                data: [
                    { topic: 'Painful Back Labor', fact: 'Caused by <span class="highlight-term">OP</span> presentation (Occiput Posterior).', alert: 'Oh Pain! Position, then Push.', q: 'A laboring mother complains of severe lower back pain. The fetus is in the ROA or ROP position? (Hint: OP = Oh Pain)', a: ['ROP (Occiput Posterior)', 'ROA (Occiput Anterior)', 'Breech', 'Transverse'], correct: 0, rationale: 'Occiput Posterior means the hard back of the baby\'s skull is grinding against the mother\'s sacrum/spine, causing excruciating back labor.' },
                    { topic: 'Back Labor Treatment', fact: '1. <span class="highlight-term">Position</span>: Knee-Chest. 2. <span class="highlight-term">Push</span>: Take fist and push into mom\'s sacrum.', alert: 'Relieves pressure and helps baby rotate.', q: 'What is the nursing intervention for painful back labor (OP presentation)?', a: ['Place mom in Knee-Chest position, then apply counter-pressure to sacrum', 'Administer immediately epidural', 'Prepare for emergency C-Section', 'Place mom on her left side and give O2'], correct: 0, rationale: 'Knee-chest lets gravity pull the baby off the spine, and counter-pressure relieves the pain.' },
                    { topic: 'Prolapsed Cord', fact: 'Cord comes out before the head. Medical Emergency!', alert: 'Baby will crush the cord and die. <span class="highlight-term">Push head, Position up</span>.', q: 'The nurse discovers a prolapsed umbilical cord. What is the FIRST action?', a: ['Push the presenting part of the baby OFF the cord', 'Place the mother in the knee-chest position', 'Cover the cord with saline gauze', 'Call the doctor'], correct: 0, rationale: 'You must immediately relieve the pressure on the cord to save the baby\'s life, then position the mother in knee-chest or Trendelenburg to keep gravity helping.' },
                    { topic: 'L.I.O.N. Protocol', fact: 'For EVERY other complication in labor (tetanic contractions, maternal hypotension, fetal distress).', alert: 'Left side, IV increase, O2, Notify MD.', q: 'A patient in active labor experiences late decelerations. Using the LION protocol, what is the first positional change?', a: ['Turn mother on her Left side', 'Place mother in Knee-Chest', 'Place mother in High Fowlers', 'Place mother flat on her back'], correct: 0, rationale: 'Turning on the left side relieves vena cava compression, increasing placental perfusion. L = Left side.' },
                    { topic: 'Stop Pitocin', fact: 'If Pitocin (Oxytocin) is running and a crisis occurs, stopping it is the <span class="highlight-term">absolute first step</span>.', alert: 'Then do LION.', q: 'A patient is receiving a Pitocin infusion and her contractions are lasting 100 seconds (tetanic). What is the FIRST nursing action?', a: ['Stop the Pitocin infusion', 'Turn her on her left side', 'Administer Oxygen', 'Notify the physician'], correct: 0, rationale: 'While LION is the general protocol, if Pitocin is causing the distress (hyperstimulation), the absolute first action before anything else is to turn it off.' },
                    { topic: 'Pain Meds in Labor', fact: 'Do not administer a systemic pain medication if the baby is likely to be born when the med is at its <span class="highlight-term">PEAK</span>.', alert: 'Causes respiratory depression in the infant.', q: 'A primigravida is at 5cm dilation. She requests IV push pain medication (peaks in 15-30 mins). Is it safe to administer?', a: ['Yes, she will not deliver in the next 15-30 minutes', 'No, primigravidas cannot have IV meds', 'Yes, because IV meds do not cross the placenta', 'No, it will cause fetal hemorrhage'], correct: 0, rationale: 'A first-time mom at 5cm is hours away from delivery. The peak of the IV med (15-30 mins) will pass long before the baby is born, avoiding neonatal respiratory depression.' },
                    { topic: 'IV vs IM Pain Meds', fact: 'IV meds peak in 15-30 mins. IM meds peak in 30-60 mins.', alert: 'Assess dilation and gravidity to estimate delivery time.', q: 'A multigravida is at 9cm dilation. She requests an IM pain injection (peaks in 45 mins). Is it safe?', a: ['No, she may deliver when the medication peaks (causing resp depression in baby)', 'Yes, IM meds are safe at any stage', 'Yes, because she is a multigravida', 'No, she must have an epidural'], correct: 0, rationale: 'A multigravida at 9cm (Transition) could deliver very quickly. In 45 minutes, the baby might be taking its first breath exactly as the narcotic peaks, causing respiratory arrest.' }
                ]
            },
            fhr: {
                title: 'Fetal Heart Rate',
                color: 'bg-emerald',
                type: 'fhr',
                description: 'Klimek 10: VEAL CHOP and Fetal Monitoring rules.',
                data: [
                    { topic: 'The LION Rule for FHR', fact: 'If the FHR tracing is BAD, it gets the <span class="highlight-term">LION</span> treatment.', alert: 'Left side, IV, O2, Notify.', q: 'What protocol is used for ominous fetal heart rate patterns?', a: ['L.I.O.N.', 'C.P.R.', 'M.O.N.A.', 'A.B.C.'], correct: 0, rationale: 'LION (Left side, IV fluids, Oxygen, Notify MD) is the universal fix for placental perfusion issues.' },
                    { topic: 'Low Fetal Heart Rate', fact: 'FHR <span class="highlight-term">< 110</span>.', alert: 'This is BAD. Do LION.', q: 'The fetal heart rate drops to 100 bpm. What is the nurse\'s action?', a: ['Stop Pitocin, turn on Left side, increase IV, apply O2, Notify (LION)', 'Document as a normal finding', 'Take the mother\'s temperature', 'Prepare for a vaginal exam'], correct: 0, rationale: 'Normal FHR is 110-160. Anything below 110 is ominous and requires immediate intervention (LION).' },
                    { topic: 'High Fetal Heart Rate', fact: 'FHR <span class="highlight-term">> 160</span>.', alert: 'This is NO BIG DEAL. Document it and take mom\'s temp.', q: 'The fetal heart rate is 170 bpm. What is the most likely cause and appropriate action?', a: ['Maternal fever; Document and take mom\'s temperature', 'Fetal distress; Perform LION', 'Cord prolapse; Push head off cord', 'Placental abruption; Emergency C-section'], correct: 0, rationale: 'Fetal tachycardia is usually a response to maternal infection/fever. It is not an immediate crisis like bradycardia.' },
                    { topic: 'Low Baseline Variability', fact: 'FHR stays the same (flat line).', alert: 'This is BAD. Do LION.', q: 'The fetal heart monitor shows minimal to absent variability. What should the nurse do?', a: ['Initiate LION protocol', 'Document as normal', 'Take mom\'s temperature', 'Perform an amnioinfusion'], correct: 0, rationale: 'A healthy baby\'s heart rate fluctuates constantly. A flat, unchanging heart rate means the baby is not getting enough oxygen or is depressed.' },
                    { topic: 'High Baseline Variability', fact: 'FHR is constantly changing.', alert: 'This is GOOD. Document it.', q: 'The fetal heart monitor shows moderate/high variability with constant fluctuations. What is the action?', a: ['Document it as a reassuring sign', 'Initiate LION protocol', 'Prepare for emergency C-section', 'Administer Oxygen'], correct: 0, rationale: 'High variability means the baby\'s autonomic nervous system is healthy and well-oxygenated.' },
                    { topic: 'Late Decelerations', fact: 'HR slows down <span class="highlight-term">AFTER</span> the contraction starts.', alert: 'This is BAD (Placental Insufficiency). Do LION.', q: 'The nurse notes late decelerations on the monitor. What does this mean and what is the action?', a: ['Placental insufficiency (BAD); Do LION', 'Cord compression; Position Knee-Chest', 'Head compression; Document', 'Normal finding; Do nothing'], correct: 0, rationale: 'Late decels mean the placenta is failing to provide oxygen during the stress of a contraction.' },
                    { topic: 'Early Decelerations', fact: 'HR slows down <span class="highlight-term">BEFORE or DURING</span> the contraction.', alert: 'This is FINE (Head Compression). Document it.', q: 'The monitor shows early decelerations mirroring the contractions. What is the cause?', a: ['Fetal head compression (Normal)', 'Umbilical cord compression', 'Placental insufficiency', 'Maternal fever'], correct: 0, rationale: 'As the uterus contracts, it squeezes the baby\'s head, causing a vagal response that briefly slows the HR. This is normal and expected.' },
                    { topic: 'Variable Decelerations', fact: 'HR drops randomly, unrelated to contractions.', alert: 'This is VERY BAD (Cord Compression). Push & Position.', q: 'What is the cause and treatment for Variable Decelerations?', a: ['Cord Compression; Push presenting part off cord and Position knee-chest', 'Placental Insufficiency; Do LION', 'Head compression; Document', 'Normal finding; Wait'], correct: 0, rationale: 'Variable = Cord. This is a prolapsed or compressed cord crisis.' },
                    { topic: 'VEAL CHOP', fact: 'Variable=Cord, Early=Head, Accel=Ok, Late=Placenta.', alert: 'Memorize this match-up.', q: 'Using VEAL CHOP, what does a Late Deceleration indicate?', a: ['Placental Insufficiency', 'Cord Compression', 'Head Compression', 'Oxygenation is OK'], correct: 0, rationale: 'V-C, E-H, A-O, L-P. Late = Placental insufficiency.' }
                ]
            },
            post: {
                title: 'Postpartum & Neonate',
                color: 'bg-amber',
                type: 'post',
                description: 'Klimek 10: BUBBLE HEAD, Lochia, Fundus, and Neonatal conditions.',
                data: [
                    { topic: 'Fundus Assessment', fact: 'Must be <span class="highlight-term">Firm, Midline, and at the correct height</span>.', alert: 'Boggy = Massage. Displaced = Catheterize.', q: 'The nurse palpates a boggy fundus displaced to the right. What are the two correct actions?', a: ['Massage the fundus until firm, then have the patient void/catheterize', 'Push it back to midline and apply ice', 'Administer Pitocin and document', 'Check the pad for bleeding and call MD'], correct: 0, rationale: 'Boggy means it is bleeding; massage it firm first. Displaced means a full bladder is pushing it out of the way; empty the bladder.' },
                    { topic: 'Fundal Height Postpartum', fact: 'Fundal height = <span class="highlight-term">Days postpartum</span>.', alert: '1 day PP = 1cm below umbilicus. 3 days PP = 3cm below.', q: 'Where should the nurse expect to find the fundus on the 2nd day postpartum?', a: ['2 cm below the umbilicus', 'At the umbilicus', '2 cm above the umbilicus', 'Not palpable'], correct: 0, rationale: 'The uterus drops roughly 1 centimeter (or fingerbreadth) per day after delivery.' },
                    { topic: 'Lochia Colors', fact: 'Rubra (Red), Serosa (Pink), Alba (White).', alert: 'Excessive bleeding = saturating a pad in < 15 minutes.', q: 'A patient is 10 days postpartum. What color lochia is expected?', a: ['Alba (White/Yellow)', 'Rubra (Bright Red)', 'Serosa (Pink/Brown)', 'Clear fluid'], correct: 0, rationale: 'Rubra is days 1-3. Serosa is days 4-10. Alba is days 11-21.' },
                    { topic: 'Extremity Assessment', fact: 'Checking for Thrombophlebitis (DVT).', alert: 'Best method: <span class="highlight-term">Bilateral calf circumference</span> measurement.', q: 'What is the most accurate way to assess a postpartum patient for thrombophlebitis?', a: ['Measure bilateral calf circumference', 'Check for a positive Homan\'s sign', 'Check pedal pulses', 'Ask if they have leg pain'], correct: 0, rationale: 'Homan\'s sign is unreliable. Measuring the calves with a tape measure provides objective evidence of unilateral swelling (DVT).' },
                    { topic: 'Caput Succedaneum', fact: 'Swelling of the scalp on the newborn.', alert: '<span class="highlight-term">C.S. Crosses Sutures</span> (and is Symmetrical).', q: 'Which statement is true regarding Caput Succedaneum?', a: ['It is symmetrical edema that crosses the cranial suture lines', 'It is bleeding under the periosteum', 'It does not cross suture lines', 'It requires surgical drainage'], correct: 0, rationale: 'Remember "C.S. Crosses Sutures". It is simple edema from the pressure of delivery and resolves quickly.' },
                    { topic: 'Cephalohematoma', fact: 'Bleeding under the periosteum of the skull.', alert: 'Does <span class="highlight-term">NOT</span> cross suture lines. Asymmetrical.', q: 'A newborn has a swelling on the right side of the head that stops exactly at the midline suture. What is this?', a: ['Cephalohematoma', 'Caput Succedaneum', 'Hydrocephalus', 'Encephalocele'], correct: 0, rationale: 'Because it is bleeding under a specific bone plate, it cannot cross the suture line to the other bone.' },
                    { topic: 'Tocolytics', fact: 'Meds that <span class="highlight-term">STOP</span> labor.', alert: 'Terbutaline (Causes maternal Tachycardia). Mag Sulfate (Causes low RR/Reflexes).', q: 'A patient is receiving Magnesium Sulfate to stop preterm labor. What assessment indicates toxicity?', a: ['Respirations < 12 and absent deep tendon reflexes (+1 or 0)', 'Heart rate of 120 and tremors', 'High blood pressure and bounding pulses', 'Increased urine output'], correct: 0, rationale: 'Mag Sulfate is a CNS depressant. Toxicity stops the lungs and reflexes. (Terbutaline is the one that causes high HR).' },
                    { topic: 'Oxytocics', fact: 'Meds that <span class="highlight-term">START</span> or strengthen labor.', alert: 'Pitocin (Risk: Hyperstimulation). Methergine (Risk: High BP).', q: 'What is a dangerous side effect of Methergine (Methylergonovine)?', a: ['Severe Hypertension', 'Severe Hypotension', 'Tachycardia', 'Bleeding'], correct: 0, rationale: 'Methergine causes powerful vasoconstriction to stop postpartum hemorrhage, which shoots the blood pressure up.' },
                    { topic: 'Fetal Lung Maturity: Betamethasone', fact: 'A steroid given to <span class="highlight-term">MOM</span> (IM injection).', alert: 'Given BEFORE the baby is born.', q: 'How is Betamethasone administered to mature fetal lungs?', a: ['Given IM to the mother BEFORE delivery', 'Given via endotracheal tube to the baby AFTER delivery', 'Given IV to the mother AFTER delivery', 'Given PO to the baby'], correct: 0, rationale: 'Betamethasone is a steroid given to the mother so it crosses the placenta and matures the lungs before birth.' },

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- Study Card Modal Logic ---
        let cardIndex = 0;

        window.openCards = function(startIdx) {
            var data = contentData[currentTab];
            cardIndex = (typeof startIdx === 'number') ? startIdx : 0;
            renderCardInModal(data.data[cardIndex], data, cardIndex, data.data.length);
            document.getElementById('card-modal').style.display = 'flex';
        };

        function renderCardInModal(item, data, idx, total) {
            document.getElementById('card-modal-header').className = 'card-modal-header ' + data.color;
            document.getElementById('card-modal-title').textContent = data.title + ' \u2014 Study Cards';
            document.getElementById('card-counter').textContent = (idx + 1) + ' / ' + total;
            document.getElementById('card-prev-btn').disabled = (idx === 0);
            document.getElementById('card-next-btn').disabled = (idx >= total - 1);
            document.getElementById('card-modal-body').innerHTML =
                '<div class="card-topic">' + item.topic + '</div>' +
                '<div class="card-section">' +
                    '<span class="card-label">Key Fact</span>' +
                    '<div class="card-fact">' + item.fact + '</div>' +
                '</div>' +
                '<div class="card-section">' +
                    '<div class="card-alert-box">' +
                        '<span class="card-label" style="color:#b91c1c;">\u26a0\ufe0f Clinical Alert</span>' +
                        '<div class="card-fact">' + item.alert + '</div>' +
                    '</div>' +
                '</div>';
        }

        window.prevCard = function() {
            var data = contentData[currentTab];
            if (cardIndex > 0) { cardIndex--; renderCardInModal(data.data[cardIndex], data, cardIndex, data.data.length); }
        };
        window.nextCard = function() {
            var data = contentData[currentTab];
            if (cardIndex < data.data.length - 1) { cardIndex++; renderCardInModal(data.data[cardIndex], data, cardIndex, data.data.length); }
        };
        window.closeCards = function() {
            document.getElementById('card-modal').style.display = 'none';
        };

        window.switchTab = function(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(function(btn) {
                btn.className = 'tab-btn';
                if(btn.id === 'tab-' + tabName) {
                    btn.classList.add('active', contentData[tabName].color);
                } else {
                    var bKey = btn.id.replace('tab-','');
                    if(contentData[bKey]) btn.classList.add(contentData[bKey].color);
                }
            });
            renderContent();
        };

        function renderContent() {
            var data = contentData[currentTab];
            var contentArea = document.getElementById('content-area');
            var descArea = document.getElementById('desc-area');

            if (descArea && data) {
                if(data.description) {
                    descArea.innerHTML = data.description;
                    descArea.style.display = 'block';
                } else {
                    descArea.style.display = 'none';
                }
            }

            var tableRows = data.data.map(function(item, i) {
                return '<tr onclick="selectRow(this, ' + i + ')">' +
                    '<td class="topic-cell ' + data.type + '">' + item.topic + '</td>' +
                    '<td class="key-point-cell">' + item.fact + '</td>' +
                    '<td class="alert-cell">' + item.alert + '</td>' +
                '</tr>';
            }).join('');

            contentArea.innerHTML =
                '<div class="section-header-bar ' + data.color + '">' +
                    '<span>' + data.title + '</span>' +
                    '<div class="header-btns">' +
                        '<button class="header-btn" style="display:none;" id="mobile-card-btn" onclick="openCards(0)">📄 Cards</button>' +
                        '<button class="header-quiz-btn" onclick="startQuiz()">Take Quiz</button>' +
                    '</div>' +
                '</div>' +
                '<div class="grid-layout">' +
                    '<div>' +
                        '<div class="table-container">' +
                            '<table>' +
                                '<thead><tr><th>Topic</th><th>Clinical Fact</th><th>Nursing Priority / Alerts</th></tr></thead>' +
                                '<tbody id="table-body">' + tableRows + '</tbody>' +
                            '</table>' +
                        '</div>' +
                    '</div>' +
                    '<div class="visual-container" id="desktop-focus-card" style="background:none; border:none; padding-top:0;">' +
                        renderFocusCard(data.data[0], data) +
                    '</div>' +
                '</div>';

            if (window.innerWidth <= 600) {
                document.getElementById('mobile-card-btn').style.display = 'inline-block';
                document.getElementById('desktop-focus-card').style.display = 'none';
            }
            
            // pre-select first row
            const firstRow = document.querySelector('#table-body tr');
            if(firstRow) firstRow.classList.add('selected');
        }
        
        function renderFocusCard(item, data) {
            if (!item || !data) return '';
            return `
                <div class="focus-card" style="border-color:${getComputedStyle(document.documentElement).getPropertyValue('--' + data.color.split('-')[1])};">
                    <div class="focus-card-header ${data.color}">
                        Study Card
                    </div>
                    <div class="focus-card-body">
                        <div>
                            <span class="focus-label">Topic</span>
                            <div class="focus-content" style="font-weight:800; font-size:1.3rem;">${item.topic}</div>
                        </div>
                        <div>
                            <span class="focus-label">Key Fact</span>
                            <div class="focus-content">${item.fact}</div>
                        </div>
                        <div class="focus-alert-box">
                            <span class="focus-label" style="color:#b91c1c;">⚠️ Clinical Alert</span>
                            <div class="focus-content" style="font-size:1rem;">${item.alert}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.selectRow = function(rowEl, index) {
            document.querySelectorAll('#table-body tr').forEach(function(r) { r.classList.remove('selected'); });
            rowEl.classList.add('selected');
            
            var data = contentData[currentTab];
            var item = data.data[index];

            if (window.innerWidth <= 600) {
                openCards(index);
            } else {
                document.getElementById('desktop-focus-card').innerHTML = renderFocusCard(item, data);
            }
        };

        // --- Quiz Logic ---
        window.startQuiz = function() {
            var data = contentData[currentTab];
            currentQuizData = data.data.slice(); // Copy array
            quizIndex = 0;
            quizScore = 0;
            showQuestion();
            document.getElementById('quiz-modal').style.display = 'flex';
        };

        function showQuestion() {
            var item = currentQuizData[quizIndex];
            var total = currentQuizData.length;
            document.getElementById('quiz-progress').textContent = 'Question ' + (quizIndex + 1) + ' of ' + total;
            document.getElementById('q-num-display').textContent = quizIndex + 1;
            document.getElementById('q-text').textContent = item.q;
            var fb = document.getElementById('feedback-area');
            fb.style.display = 'none';
            fb.classList.remove('is-visible');
            document.getElementById('next-btn').style.display = 'none';

            let answerObjects = item.a.map((ans, index) => ({ text: ans, originalIndex: index }));
            answerObjects = shuffleArray(answerObjects);

            var letters = ['A', 'B', 'C', 'D'];
            var optionsHTML = answerObjects.map(function(ansObj, i) {
                return '<div class="quiz-option" data-original-index="' + ansObj.originalIndex + '" onclick="checkAnswer(' + ansObj.originalIndex + ', this)">' +
                    '<div class="quiz-option-letter">' + letters[i] + '</div>' +
                    '<span style="flex-grow:1;">' + ansObj.text + '</span>' +
                    '<div class="correct-check" style="display:none; color:#10b981; font-weight:bold; font-size:1.2rem; margin-left:0.5rem;">✔</div>' +
                '</div>';
            }).join('');
            document.getElementById('q-options').innerHTML = optionsHTML;
        }

        window.checkAnswer = function(selectedOriginalIndex, btnElement) {
            var item = currentQuizData[quizIndex];
            var correct = item.correct;
            var options = document.querySelectorAll('.quiz-option');
            
            options.forEach(function(btn) {
                btn.style.pointerEvents = 'none';
            });

            var feedbackArea = document.getElementById('feedback-area');
            var feedbackHeader = document.getElementById('feedback-header');
            var rationaleText = document.getElementById('rationale-text');
            var nextBtn = document.getElementById('next-btn');

            if (rationaleText) rationaleText.innerHTML = item.rationale || "No rationale provided.";
            if (feedbackArea) feedbackArea.style.display = 'block';
            if (nextBtn) nextBtn.style.display = 'block';

            let isCorrect = (selectedOriginalIndex === correct);

            if (isCorrect) {
                quizScore++;
                btnElement.classList.add('correct-choice');
                btnElement.querySelector('.correct-check').style.display = 'block';
                if (feedbackHeader) {
                    feedbackHeader.className = 'feedback-header correct';
                    feedbackHeader.innerHTML = '✔ Correct!';
                }
                try { playSound('correct'); } catch(e){}
            } else {
                btnElement.classList.add('wrong-choice');
                const correctOption = Array.from(options).find(opt => parseInt(opt.dataset.originalIndex) === correct);
                if(correctOption) {
                    correctOption.classList.add('correct-choice');
                    correctOption.querySelector('.correct-check').style.display = 'block';
                }
                if (feedbackHeader) {
                    feedbackHeader.className = 'feedback-header incorrect';
                    feedbackHeader.innerHTML = '✖ Incorrect';
                }
                try { playSound('wrong'); } catch(e){}
            }

            if (quizIndex >= currentQuizData.length - 1) {
                nextBtn.textContent = 'Finish (' + quizScore + '/' + currentQuizData.length + ')';
            } else {
                nextBtn.textContent = 'Next Question';
            }

            setTimeout(function() {
                var quizBox = document.querySelector('.quiz-box');
                if (quizBox) {
                    quizBox.scrollTo({ top: quizBox.scrollHeight, behavior: 'smooth' });
                }
            }, 100);
        };

        window.nextQuestion = function() {
            quizIndex++;
            if (quizIndex < currentQuizData.length) {
                showQuestion();
                var overlay = document.querySelector('.quiz-box');
                overlay.scrollTop = 0;
            } else {
                var optionsContainer = document.getElementById('q-options');
                var qText = document.getElementById('q-text');
                if (qText) qText.innerText = "Quiz Complete!";
                if (optionsContainer) {
                    optionsContainer.innerHTML = `
                        <div style="text-align:center; padding:2rem; background: rgba(255,255,255,0.05); border-radius: 1rem;">
                            <h2 style="font-size: 2rem; margin-bottom: 1rem; color: white;">You scored ${quizScore} / ${currentQuizData.length}</h2>
                            <button class="action-btn" style="width:100%; max-width: 300px; background-color: var(--accent-gold); color: white; padding: 1rem; border: none; border-radius: 2rem; font-weight: bold; cursor: pointer; font-size: 1.1rem;" onclick="closeQuiz()">Return to Guide</button>
                        </div>
                    `;
                }
                document.getElementById('feedback-area').style.display = 'none';
                document.getElementById('next-btn').style.display = 'none';
                document.getElementById('q-num-display').style.display = 'none';
            }
        };

        window.closeQuiz = function() {
            document.getElementById('quiz-modal').style.display = 'none';
            document.getElementById('q-num-display').style.display = 'flex'; // reset for next time
        };

        window.addEventListener('resize', function() {
            if(document.getElementById('content-area').innerHTML !== "") {
                if (window.innerWidth <= 600) {
                    document.getElementById('mobile-card-btn').style.display = 'inline-block';
                    document.getElementById('desktop-focus-card').style.display = 'none';
                } else {
                    document.getElementById('mobile-card-btn').style.display = 'none';
                    document.getElementById('desktop-focus-card').style.display = 'flex';
                }
            }
        });

        // Initial Render
        switchTab('preg');

    })();
    </script>
</div>

</body>
</html>
